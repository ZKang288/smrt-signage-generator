<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG MRT Signage Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- Font Setup --- */
        @font-face {
            font-family: 'MRT-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype'),
                 url('OceanSans.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #0f172a;
        }

        p.subtitle {
            margin: 0;
            margin-bottom: 30px;
            color: #64748b;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        /* --- Layout Grid --- */
        .editor-regions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .editor-regions { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input, .control-group select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input[type="range"] {
            padding: 5px 0;
            cursor: pointer;
        }

        .control-group input:focus, .control-group select:focus {
            border-color: #004c54;
        }

        /* --- Dynamic Line Rows --- */
        .line-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr auto;
            gap: 10px;
            align-items: center;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-picker-wrapper input[type="color"] {
            padding: 0;
            width: 35px;
            height: 35px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            background: none;
        }

        .btn-action {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-add {
            background-color: #e2e8f0;
            color: #334155;
            width: 100%;
            margin-top: 5px;
        }

        .btn-add:hover:not(:disabled) { background-color: #cbd5e1; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
        }
        .btn-delete:hover { background-color: #fca5a5; }

        .btn-download {
            background-color: #004c54;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 76, 84, 0.2);
            transition: background 0.2s;
        }

        .btn-download:hover { background-color: #00333a; }

        /* --- MRT Signage Output Area (Dynamic Extension Setup) --- */
        .signage-wrapper {
            overflow-x: auto;
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        #mrt-signage {
            min-width: 1080px;
            width: fit-content; /* Dynamic expansion support */
            height: 190px; 
            background-color: #004c54; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            gap: 60px; /* Maintains clean spacing margin between layers */
            box-sizing: border-box;
            user-select: none;
            white-space: nowrap;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 35px;
            flex-shrink: 0;
        }

        /* Unified Interchange Code Capsule */
        .interchange-capsule {
            border: 4px solid #ffffff;
            display: inline-flex;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            height: 68px; 
            box-sizing: border-box;
        }

        .code-segment {
            padding: 0 20px; 
            font-size: 26px; 
            font-weight: bold;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            white-space: nowrap;
        }

        /* Station Name */
        .station-name {
            color: #ffffff;
            font-size: 54px; 
            font-weight: 500;
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            letter-spacing: 0.2px;
        }

        /* --- Image-based Exit Box Asset Wrapper --- */
        .exit-container {
            position: relative;
            width: 76px;
            height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .exit-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .exit-number {
            position: absolute;
            color: #000000; 
            font-size: 28px;
            font-weight: 900;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffcd00; 
            padding: 0 2px;
            line-height: 1;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav style="margin-bottom: 20px; display: flex; gap: 15px;">
        <a href="index.html" style="font-weight: bold; color: #004c54; text-decoration: none;">📋 Signage Generator</a>
        <a href="map.html" style="color: #64748b; text-decoration: none;">🗺️ Platform Map Generator</a>
    </nav>

    <h1>Singapore MRT Signage Generator</h1>
    <p class="subtitle">Supports dynamic signboard extension, 2:1 elliptical curves, and up to 10 lines</p>

    <div class="container">
        <div class="editor-regions">
            <div>
                <div class="section-title">General Settings</div>
                <div class="control-group">
                    <label for="stationName">Station Name</label>
                    <input type="text" id="stationName" value="Bishan South">
                </div>
                <div class="control-group">
                    <label for="exitNumber">Exit Identifier</label>
                    <input type="text" id="exitNumber" value="1">
                </div>

                <div class="section-title" style="margin-top: 25px;">Caplet Geometry</div>
                <div class="control-group">
                    <label for="capsuleHeight">Capsule Height: <span id="heightVal">68px</span></label>
                    <input type="range" id="capsuleHeight" min="45" max="110" value="68">
                </div>
                <div class="control-group">
                    <label for="capsuleRoundness">Vertical Radius (2:1 Ellipse): <span id="roundnessVal">34px</span></label>
                    <input type="range" id="capsuleRoundness" min="0" max="55" value="34">
                </div>
            </div>

            <div>
                <div class="section-title">Lines Configuration (Max 10)</div>
                <div id="linesContainer"></div>
                <button id="addLineBtn" class="btn-action btn-add">+ Add Interchange Line</button>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">Export Signage as PNG</button>
    </div>

    <div class="signage-wrapper">
        <div id="mrt-signage">
            <div class="left-section">
                <img src="mrt_logo.svg" alt="MRT Logo" style="height: 68px; width: auto; display: block;">

                <div class="interchange-capsule" id="interchangeCapsule"></div>
                
                <div class="station-name" id="signageName">Bishan South</div>
            </div>

            <div class="exit-container">
                <img src="exit_logo.png" alt="Exit Icon" class="exit-image">
                <div class="exit-number" id="signageExit">1</div>
            </div>
        </div>
    </div>

    <script>
        // Predefined LTA Palette Registry
        const standardLines = [
            { name: "North–South Line (NS)", color: "#d42e12" },
            { name: "Circle Line (CC)", color: "#fa9e0d" },
            { name: "East–West Line (EW)", color: "#009645" },
            { name: "North East Line (NE)", color: "#9900aa" },
            { name: "Downtown Line (DT)", color: "#005ec4" },
            { name: "Thomson–East Coast Line (TE)", color: "#9D5B25" },
            { name: "Cross Island Line (CR)", color: "#97C616" },
            { name: "Jurong Region Line (JW)", color: "#0099aa" },
            { name: "Branch Line (BP)", color: "#b85600" },
            { name: "[ Custom Color ]", color: "#custom" }
        ];

        // Initial default state configuration matching the user's sample
        let linesState = [
            { code: "NS 17", color: "#d42e12" },
            { code: "CC 15", color: "#fa9e0d" }
        ];

        const linesContainer = document.getElementById('linesContainer');
        const addLineBtn = document.getElementById('addLineBtn');
        const stationNameInput = document.getElementById('stationName');
        const exitNumberInput = document.getElementById('exitNumber');
        const interchangeCapsule = document.getElementById('interchangeCapsule');
        const signageName = document.getElementById('signageName');
        const signageExit = document.getElementById('signageExit');

        // Geometry Inputs
        const capsuleHeightInput = document.getElementById('capsuleHeight');
        const capsuleRoundnessInput = document.getElementById('capsuleRoundness');
        const heightVal = document.getElementById('heightVal');
        const roundnessVal = document.getElementById('roundnessVal');

        // Intelligent relative luminance calculator for automatic text contrast styling
        function getContrastColor(hexColor) {
            const darkTextLines = ["#FA9E0D", "#97C616", "#0099AA", "#FFCD00"];
            if (darkTextLines.includes(hexColor.toUpperCase())) return '#000000';
            
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 140) ? '#000000' : '#ffffff';
        }

        function renderControls() {
            linesContainer.innerHTML = '';
            linesState.forEach((line, index) => {
                const row = document.createElement('div');
                row.className = 'line-row';

                const select = document.createElement('select');
                let isCustom = true;
                standardLines.forEach(std => {
                    const opt = document.createElement('option');
                    opt.value = std.color;
                    opt.text = std.name;
                    if (std.color.toUpperCase() === line.color.toUpperCase()) {
                        opt.selected = true;
                        isCustom = false;
                    }
                    select.appendChild(opt);
                });

                if (isCustom && line.color !== "#custom") {
                    select.value = "#custom";
                }

                const codeInput = document.createElement('input');
                codeInput.type = 'text';
                codeInput.value = line.code;
                codeInput.placeholder = "e.g. NS 17";

                const pickerWrapper = document.createElement('div');
                pickerWrapper.className = 'color-picker-wrapper';
                
                const colorPicker = document.createElement('input');
                colorPicker.type = 'color';
                colorPicker.value = isCustom ? line.color : "#64748b";
                colorPicker.style.display = isCustom ? 'block' : 'none';

                pickerWrapper.appendChild(select);
                pickerWrapper.appendChild(colorPicker);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-action btn-delete';
                delBtn.innerText = '✕';
                if (linesState.length === 1) delBtn.disabled = true;

                select.addEventListener('change', (e) => {
                    if (e.target.value === '#custom') {
                        linesState[index].color = '#64748b';
                    } else {
                        linesState[index].color = e.target.value;
                    }
                    renderAll();
                });

                colorPicker.addEventListener('input', (e) => {
                    linesState[index].color = e.target.value;
                    updateSignagePreview();
                });

                codeInput.addEventListener('input', (e) => {
                    linesState[index].code = e.target.value;
                    updateSignagePreview();
                });

                delBtn.addEventListener('click', () => {
                    linesState.splice(index, 1);
                    renderAll();
                });

                row.appendChild(pickerWrapper);
                row.appendChild(codeInput);
                row.appendChild(delBtn);
                linesContainer.appendChild(row);
            });

            addLineBtn.disabled = linesState.length >= 10;
        }

        function updateSignagePreview() {
            // Update textual elements
            signageName.innerText = stationNameInput.value;
            signageExit.innerText = exitNumberInput.value.toUpperCase();

            // Parse slider value for a 2:1 Elliptical Profile Configuration
            const vRadius = parseInt(capsuleRoundnessInput.value);
            const hRadius = vRadius * 2; // Strict 2:1 horizontal-to-vertical multiplier lock

            // Update Geometry Metrics Label Indicators
            heightVal.innerText = capsuleHeightInput.value + 'px';
            roundnessVal.innerText = `${hRadius}px / ${vRadius}px`;

            // Apply custom layout transformations
            interchangeCapsule.style.height = capsuleHeightInput.value + 'px';
            interchangeCapsule.style.borderRadius = `${hRadius}px / ${vRadius}px`;

            // Construct unified interchange capsule architecture
            interchangeCapsule.innerHTML = '';
            linesState.forEach(line => {
                const segment = document.createElement('div');
                segment.className = 'code-segment';
                segment.style.backgroundColor = line.color;
                segment.style.color = getContrastColor(line.color);
                segment.innerText = line.code.toUpperCase();
                interchangeCapsule.appendChild(segment);
            });
        }

        function renderAll() {
            renderControls();
            updateSignagePreview();
        }

        // Event Listeners for controls
        addLineBtn.addEventListener('click', () => {
            if (linesState.length < 10) { 
                linesState.push({ code: 'TE 7', color: '#9D5B25' });
                renderAll();
            }
        });

        stationNameInput.addEventListener('input', updateSignagePreview);
        exitNumberInput.addEventListener('input', updateSignagePreview);
        capsuleHeightInput.addEventListener('input', updateSignagePreview);
        capsuleRoundnessInput.addEventListener('input', updateSignagePreview);

        // Core initialization trigger
        renderAll();

        // --- Quality Export Capture Engine ---
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const target = document.getElementById('mrt-signage');
            document.fonts.ready.then(() => {
                html2canvas(target, {
                    scale: 2, 
                    logging: false,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const downloadLink = document.createElement('a');
                    downloadLink.download = `${stationNameInput.value.trim().replace(/\s+/g, '_')}_signage.png`;
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.click();
                });
            });
        });
    </script>
</body>
</html>

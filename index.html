<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG MRT Signage Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- Font Setup --- */
        @font-face {
            font-family: 'MRT-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype'),
                 url('OceanSans.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #0f172a;
        }

        p.subtitle {
            margin: 0;
            margin-bottom: 30px;
            color: #64748b;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        /* --- Layout Grid --- */
        .editor-regions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .editor-regions { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input, .control-group select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input[type="range"] {
            padding: 5px 0;
            cursor: pointer;
        }

        .control-group input:focus, .control-group select:focus {
            border-color: #004c54;
        }

        /* --- Dynamic Line Rows --- */
        .line-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr auto;
            gap: 10px;
            align-items: center;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-picker-wrapper input[type="color"] {
            padding: 0;
            width: 35px;
            height: 35px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            background: none;
        }

        .btn-action {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-add {
            background-color: #e2e8f0;
            color: #334155;
            width: 100%;
            margin-top: 5px;
        }

        .btn-add:hover:not(:disabled) { background-color: #cbd5e1; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
        }
        .btn-delete:hover { background-color: #fca5a5; }

        .btn-download {
            background-color: #004c54;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 76, 84, 0.2);
            transition: background 0.2s;
        }

        .btn-download:hover { background-color: #00333a; }

        /* --- MRT Signage Output Area --- */
        .signage-wrapper {
            overflow-x: auto;
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        #mrt-signage {
            height: 190px; 
            background-color: #004c54; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            gap: 60px; 
            box-sizing: border-box;
            user-select: none;
            white-space: nowrap;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 35px;
            flex-shrink: 0;
        }

        .code-segment {
            font-size: 26px; 
            font-weight: bold;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            white-space: nowrap;
            box-sizing: border-box;
        }

        /* Station Name */
        .station-name {
            color: #ffffff;
            font-size: 54px; 
            font-weight: 500;
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            letter-spacing: 0.2px;
        }

        /* --- Image-based Exit Box Asset Wrapper --- */
        .exit-container {
            position: relative;
            width: 76px;
            height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .exit-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .exit-number {
            position: absolute;
            color: #000000; 
            font-size: 28px;
            font-weight: 900;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffcd00; 
            padding: 0 2px;
            line-height: 1;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav style="margin-bottom: 20px; display: flex; gap: 15px;">
        <a href="index.html" style="font-weight: bold; color: #004c54; text-decoration: none;">📋 Signage Generator</a>
        <a href="map.html" style="color: #64748b; text-decoration: none;">🗺️ Platform Map Generator</a>
    </nav>

    <h1>Singapore MRT Signage Generator</h1>
    <p class="subtitle">Supports length adjustments, visibility toggles, 2:1 elliptical curves, and up to 10 lines</p>

    <div class="container">
        <div class="editor-regions">
            <div>
                <div class="section-title">General Settings</div>
                <div class="control-group">
                    <label for="stationName">Station Name</label>
                    <input type="text" id="stationName" value="Bishan South">
                </div>
                
                <div style="display: flex; gap: 25px; margin-bottom: 15px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="showExit" checked style="width: auto; cursor: pointer;">
                        <label for="showExit" style="font-size: 13px; font-weight: 600; color: #475569; margin: 0; cursor: pointer;">Display Exit Box</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="autoWidth" checked style="width: auto; cursor: pointer;">
                        <label for="autoWidth" style="font-size: 13px; font-weight: 600; color: #475569; margin: 0; cursor: pointer;">Auto Width</label>
                    </div>
                </div>

                <div class="control-group" id="exitInputGroup">
                    <label for="exitNumber">Exit Identifier</label>
                    <input type="text" id="exitNumber" value="1">
                </div>

                <div class="control-group" id="widthSliderGroup" style="display: none;">
                    <label for="signageWidth">Signboard Custom Width: <span id="widthVal">1080px</span></label>
                    <input type="range" id="signageWidth" min="800" max="2500" value="1080">
                </div>

                <div class="section-title" style="margin-top: 25px;">Caplet Geometry</div>
                <div class="control-group">
                    <label for="capsuleHeight">Capsule Height: <span id="heightVal">68px</span></label>
                    <input type="range" id="capsuleHeight" min="45" max="110" value="68">
                </div>
                <div class="control-group">
                    <label for="capsuleRoundness">Vertical Radius (2:1 Ellipse): <span id="roundnessVal">40px</span></label>
                    <input type="range" id="capsuleRoundness" min="0" max="80" value="40">
                </div>
            </div>

            <div>
                <div class="section-title">Lines Configuration (Max 10)</div>
                <div id="linesContainer"></div>
                <button id="addLineBtn" class="btn-action btn-add">+ Add Interchange Line</button>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">Export Signage as PNG</button>
    </div>

    <div class="signage-wrapper">
        <div id="mrt-signage">
            <div class="left-section">
                <img src="mrt_logo.svg" alt="MRT Logo" style="height: 68px; width: auto; display: block;">

                <div id="interchangeCapsule" style="display: inline-flex; align-items: center; position: relative; box-sizing: border-box;">
                    <div id="capsuleInner" style="display: inline-flex; box-sizing: border-box;"></div>
                </div>
                
                <div class="station-name" id="signageName">Bishan South</div>
            </div>

            <div class="exit-container" id="exitContainer">
                <img src="exit_logo.png" alt="Exit Icon" class="exit-image">
                <div class="exit-number" id="signageExit">1</div>
            </div>
        </div>
    </div>

    <script>
        // Predefined LTA Palette Registry
        const standardLines = [
            { name: "North–South Line (NS)", color: "#d42e12" },
            { name: "Circle Line (CC)", color: "#fa9e0d" },
            { name: "East–West Line (EW)", color: "#009645" },
            { name: "North East Line (NE)", color: "#9900aa" },
            { name: "Downtown Line (DT)", color: "#005ec4" },
            { name: "Thomson–East Coast Line (TE)", color: "#9D5B25" },
            { name: "Cross Island Line (CR)", color: "#97C616" },
            { name: "Jurong Region Line (JW)", color: "#0099aa" },
            { name: "Branch Line (BP)", color: "#b85600" },
            { name: "[ Custom Color ]", color: "#custom" }
        ];

        // Initial default state configuration matching the user's sample
        let linesState = [
            { code: "NS 17", color: "#d42e12" },
            { code: "CC 15", color: "#fa9e0d" }
        ];

        const linesContainer = document.getElementById('linesContainer');
        const addLineBtn = document.getElementById('addLineBtn');
        const stationNameInput = document.getElementById('stationName');
        const exitNumberInput = document.getElementById('exitNumber');
        const outerCapsule = document.getElementById('interchangeCapsule');
        const innerCapsule = document.getElementById('capsuleInner');
        const signageName = document.getElementById('signageName');
        const signageExit = document.getElementById('signageExit');
        const mrtSignage = document.getElementById('mrt-signage');
        const exitContainer = document.getElementById('exitContainer');

        // Toggle / Width Inputs
        const showExit = document.getElementById('showExit');
        const autoWidth = document.getElementById('autoWidth');
        const exitInputGroup = document.getElementById('exitInputGroup');
        const widthSliderGroup = document.getElementById('widthSliderGroup');
        const signageWidthInput = document.getElementById('signageWidth');
        const widthVal = document.getElementById('widthVal');

        // Geometry Inputs
        const capsuleHeightInput = document.getElementById('capsuleHeight');
        const capsuleRoundnessInput = document.getElementById('capsuleRoundness');
        const heightVal = document.getElementById('heightVal');
        const roundnessVal = document.getElementById('roundnessVal');

        // Intelligent relative luminance calculator for automatic text contrast styling
        function getContrastColor(hexColor) {
            const darkTextLines = ["#FA9E0D", "#97C616", "#0099AA", "#FFCD00"];
            if (darkTextLines.includes(hexColor.toUpperCase())) return '#000000';
            
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 140) ? '#000000' : '#ffffff';
        }

        function renderControls() {
            linesContainer.innerHTML = '';
            linesState.forEach((line, index) => {
                const row = document.createElement('div');
                row.className = 'line-row';

                const select = document.createElement('select');
                let isCustom = true;
                standardLines.forEach(std => {
                    const opt = document.createElement('option');
                    opt.value = std.color;
                    opt.text = std.name;
                    if (std.color.toUpperCase() === line.color.toUpperCase()) {
                        opt.selected = true;
                        isCustom = false;
                    }
                    select.appendChild(opt);
                });

                if (isCustom && line.color !== "#custom") {
                    select.value = "#custom";
                }

                const codeInput = document.createElement('input');
                codeInput.type = 'text';
                codeInput.value = line.code;
                codeInput.placeholder = "e.g. NS 17";

                const pickerWrapper = document.createElement('div');
                pickerWrapper.className = 'color-picker-wrapper';
                
                const colorPicker = document.createElement('input');
                colorPicker.type = 'color';
                colorPicker.value = isCustom ? line.color : "#64748b";
                colorPicker.style.display = isCustom ? 'block' : 'none';

                pickerWrapper.appendChild(select);
                pickerWrapper.appendChild(colorPicker);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-action btn-delete';
                delBtn.innerText = '✕';
                if (linesState.length === 1) delBtn.disabled = true;

                select.addEventListener('change', (e) => {
                    if (e.target.value === '#custom') {
                        linesState[index].color = '#64748b';
                    } else {
                        linesState[index].color = e.target.value;
                    }
                    renderAll();
                });

                colorPicker.addEventListener('input', (e) => {
                    linesState[index].color = e.target.value;
                    updateSignagePreview();
                });

                codeInput.addEventListener('input', (e) => {
                    linesState[index].code = e.target.value;
                    updateSignagePreview();
                });

                delBtn.addEventListener('click', () => {
                    linesState.splice(index, 1);
                    renderAll();
                });

                row.appendChild(pickerWrapper);
                row.appendChild(codeInput);
                row.appendChild(delBtn);
                linesContainer.appendChild(row);
            });

            addLineBtn.disabled = linesState.length >= 10;
        }

        function updateSignagePreview() {
            // Toggle Display Rules
            exitContainer.style.display = showExit.checked ? 'flex' : 'none';
            exitInputGroup.style.display = showExit.checked ? 'flex' : 'none';

            if (autoWidth.checked) {
                mrtSignage.style.width = 'fit-content';
                mrtSignage.style.minWidth = '1080px';
                widthSliderGroup.style.display = 'none';
            } else {
                mrtSignage.style.width = signageWidthInput.value + 'px';
                mrtSignage.style.minWidth = 'unset';
                widthSliderGroup.style.display = 'flex';
                widthVal.innerText = signageWidthInput.value + 'px';
            }

            // Update textual elements
            signageName.innerText = stationNameInput.value;
            signageExit.innerText = exitNumberInput.value.toUpperCase();

            // Setup mathematical constraints
            const H = parseInt(capsuleHeightInput.value);
            const minVr = Math.ceil(H / 2);
            
            // Enforce minimum vertical bounds to prevent layout math errors
            capsuleRoundnessInput.min = minVr;
            if (parseInt(capsuleRoundnessInput.value) < minVr) {
                capsuleRoundnessInput.value = minVr;
            }

            const Vr = parseInt(capsuleRoundnessInput.value);
            const Hr = Vr * 2; // Strict 2:1 horizontal-to-vertical lock

            // Calculate the horizontal wing extension distance to pad the text perfectly
            const ratio = (H * H) / (4 * Vr * Vr);
            const xCorner = Hr * (1 - Math.sqrt(1 - ratio));

            // Update Geometry Indicators
            heightVal.innerText = H + 'px';
            roundnessVal.innerText = `${Hr}px / ${Vr}px`;

            // The caplet is rendered as: [left end-cap SVG] [colored segments] [right end-cap SVG]
            // This produces the authentic LTA pill shape with full rounded ends visible outside the colors.
            const borderW = 4;
            const capletH = H; // outer height including border
            const innerH = H - borderW * 2; // colored area height
            // End-cap SVG: a half-ellipse (Hr wide, Vr tall) centered vertically, with white fill
            // The end-cap sits outside the segments and provides the rounded pill termination.

            outerCapsule.style.height = capletH + 'px';
            outerCapsule.style.display = 'inline-flex';
            outerCapsule.style.alignItems = 'center';
            outerCapsule.style.overflow = 'visible';
            outerCapsule.style.filter = 'drop-shadow(0 4px 8px rgba(0,0,0,0.3))';

            // Clear and construct layout segments dynamically
            innerCapsule.innerHTML = '';
            innerCapsule.style.height = capletH + 'px';
            innerCapsule.style.boxSizing = 'border-box';
            innerCapsule.style.marginTop = '';
            innerCapsule.style.borderRadius = '';
            innerCapsule.style.border = 'none';
            innerCapsule.style.borderTop = `${borderW}px solid #ffffff`;
            innerCapsule.style.borderBottom = `${borderW}px solid #ffffff`;
            innerCapsule.style.overflow = 'hidden';
            innerCapsule.style.outline = 'none';

            linesState.forEach((line, index) => {
                const segment = document.createElement('div');
                segment.className = 'code-segment';
                segment.style.backgroundColor = line.color;
                segment.style.color = getContrastColor(line.color);
                segment.innerText = line.code.toUpperCase();
                segment.style.height = '100%';
                segment.style.paddingLeft = '18px';
                segment.style.paddingRight = '18px';
                // Divider between segments
                if (index > 0) segment.style.borderLeft = `${borderW}px solid #ffffff`;
                innerCapsule.appendChild(segment);
            });

            // Build end-cap SVGs using correct geometry from ZK's sketch:
            // The shape is a full ellipse (Hr × Vr) with the top arc (B) and bottom arc (C) removed,
            // keeping only the vertical slice that aligns with the rectangle height H.
            //
            // Ellipse centre is at (cx, Vr) in ellipse-space.
            // The rectangle top/bottom are at y = Vr - H/2 and y = Vr + H/2 in ellipse-space.
            // At those y-values, the ellipse x-offset from centre = xCorner (pre-calculated).
            // So the cap wing extends xCorner px beyond the rectangle edge.
            //
            // SVG path for LEFT cap (ellipse centre at right edge of SVG):
            //   Start at (xCorner, 0) [top-right of cap, meeting rect]
            //   Arc leftward around to (xCorner, H) [bottom-right]
            //   Close with a vertical line back up.
            // Sweep direction: left cap arcs counter-clockwise (sweep=0), right cap clockwise (sweep=1).

            function makeEndCap(side) {
                const rx = Hr;   // horizontal ellipse radius
                const ry = Vr;   // vertical ellipse radius
                const h = capletH; // SVG height = rectangle height H

                // How far the cap wing protrudes beyond the rect edge (at top/bottom corners)
                // xCorner already computed above from ellipse intersection math
                const wing = xCorner; // px the arc extends outward from rect

                // SVG canvas: wing + border padding wide, h tall
                const pad = borderW;
                const svgW = wing + pad;

                // In SVG coords, ellipse centre x:
                //   LEFT cap:  centre is at the RIGHT edge of SVG (x = svgW - pad/2 = wing + pad/2... 
                //              but we want the flat join face at x = pad, so centre at x = svgW)
                //   RIGHT cap: centre is at LEFT edge (x = 0)
                const ecx = side === 'left' ? svgW : 0;
                const ecy = h / 2;

                // Arc start/end points in SVG coords:
                //   At top:    x = ecx ± wing,  y = 0        (the corner where arc meets rect top)
                //   At bottom: x = ecx ± wing,  y = h
                const innerX = side === 'left' ? svgW - wing : wing; // x of the flat join face
                const outerX_top    = innerX; // same x — arc starts here at y=0
                const outerX_bottom = innerX; // and ends here at y=h
                // sweep: left cap arcs CCW (sweep-flag=0), right cap CW (sweep-flag=1)
                const sweep = side === 'left' ? 0 : 1;

                const adjLine = side === 'left' ? linesState[0] : linesState[linesState.length - 1];
                const fillColor = adjLine.color;

                // Build filled path: arc from top-inner to bottom-inner, closed with vertical line
                // For LEFT: M (innerX, 0)  A rx ry 0 0 0 (innerX, h)  L (innerX, h) ... close
                // The arc goes around the outside. We trace:
                //   top corner → around the ellipse tip → bottom corner → straight back
                const fillPath = `M ${innerX} 0 A ${rx} ${ry} 0 0 ${sweep} ${innerX} ${h} Z`;

                // Border stroke path: same arc, inset by borderW/2
                // Inset rx and ry slightly, keep same centre
                const srx = rx - pad / 2;
                const sry = ry - pad / 2;
                // Recompute inset wing at y = ±H/2 from ellipse centre
                const t = (h / 2) / sry; // normalised y for inset ellipse
                const insetWing = t <= 1 ? srx * (1 - Math.sqrt(1 - t * t)) : srx;
                const sinnerX = side === 'left' ? svgW - insetWing : insetWing;
                const strokePath = `M ${sinnerX} ${pad/2} A ${srx} ${sry} 0 0 ${sweep} ${sinnerX} ${h - pad/2}`;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', svgW);
                svg.setAttribute('height', h);
                svg.style.display = 'block';
                svg.style.flexShrink = '0';
                svg.style.overflow = 'visible';

                // Filled shape
                const fillEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                fillEl.setAttribute('d', fillPath);
                fillEl.setAttribute('fill', fillColor);
                svg.appendChild(fillEl);

                // White border arc (open path, no fill)
                const strokeEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                strokeEl.setAttribute('d', strokePath);
                strokeEl.setAttribute('fill', 'none');
                strokeEl.setAttribute('stroke', '#ffffff');
                strokeEl.setAttribute('stroke-width', pad);
                strokeEl.setAttribute('stroke-linecap', 'butt');
                svg.appendChild(strokeEl);

                return svg;
            }

            // Remove old end-caps if present
            const oldLeft = outerCapsule.querySelector('.end-cap-left');
            const oldRight = outerCapsule.querySelector('.end-cap-right');
            if (oldLeft) oldLeft.remove();
            if (oldRight) oldRight.remove();

            const leftCap = makeEndCap('left');
            leftCap.classList.add('end-cap-left');
            const rightCap = makeEndCap('right');
            rightCap.classList.add('end-cap-right');

            outerCapsule.insertBefore(leftCap, innerCapsule);
            outerCapsule.appendChild(rightCap);
        }

        function renderAll() {
            renderControls();
            updateSignagePreview();
        }

        // Event Listeners for controls
        addLineBtn.addEventListener('click', () => {
            if (linesState.length < 10) { 
                linesState.push({ code: 'TE 7', color: '#9D5B25' });
                renderAll();
            }
        });

        stationNameInput.addEventListener('input', updateSignagePreview);
        exitNumberInput.addEventListener('input', updateSignagePreview);
        showExit.addEventListener('change', updateSignagePreview);
        autoWidth.addEventListener('change', updateSignagePreview);
        signageWidthInput.addEventListener('input', updateSignagePreview);
        capsuleHeightInput.addEventListener('input', updateSignagePreview);
        capsuleRoundnessInput.addEventListener('input', updateSignagePreview);

        // Core initialization trigger
        renderAll();

        // --- Quality Export Capture Engine ---
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const target = document.getElementById('mrt-signage');
            document.fonts.ready.then(() => {
                html2canvas(target, {
                    scale: 2, 
                    logging: false,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const downloadLink = document.createElement('a');
                    downloadLink.download = `${stationNameInput.value.trim().replace(/\s+/g, '_')}_signage.png`;
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.click();
                });
            });
        });
    </script>
</body>
</html>

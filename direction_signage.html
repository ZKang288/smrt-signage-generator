<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction Signage Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'MRT-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype'),
                 url('OceanSans.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 30px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; color: #0f172a; }
        p.subtitle { margin: 0 0 28px; color: #64748b; font-size: 14px; }

        .panel {
            width: 100%;
            max-width: 1150px;
            background: white;
            padding: 28px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px -4px rgba(0,0,0,0.07);
            margin-bottom: 28px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .global-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .ctrl { display: flex; flex-direction: column; gap: 5px; }

        .ctrl label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .ctrl input[type="range"] { width: 100%; accent-color: #004c54; cursor: pointer; }

        .ctrl input[type="text"],
        .ctrl select,
        .ctrl input[type="color"] {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .ctrl input:focus, .ctrl select:focus { border-color: #004c54; }

        /* --- Row Builder --- */
        .rows-wrapper { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }

        /* Each row editor is now a vertical card, not a cramped grid */
        .sig-row-editor {
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Top strip: direction, color, move, delete */
        .row-top {
            display: grid;
            grid-template-columns: 160px 100px 1fr auto auto;
            gap: 8px;
            align-items: end;
        }

        /* Bottom strip: exits + destination */
        .row-bottom {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: start;
        }

        .exits-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
        }

        /* A single exit tag pill in the editor */
        .exit-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #ffcd00;
            border-radius: 6px;
            padding: 3px 6px 3px 8px;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            flex-shrink: 0;
            width: auto;
        }

        .exit-tag input {
            width: 32px;
            min-width: 0;
            flex-shrink: 0;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            outline: none;
            text-align: center;
            padding: 0;
        }

        .exit-tag-del {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #7a5a00;
            line-height: 1;
            padding: 0 2px;
        }
        .exit-tag-del:hover { color: #ef4444; }

        .btn-add-exit {
            background: #e2e8f0;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-add-exit:hover { background: #cbd5e1; }

        .sig-row-editor label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            display: block;
            margin-bottom: 3px;
        }

        .sig-row-editor input[type="text"],
        .sig-row-editor select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            color: #1e293b;
            background: white;
            outline: none;
        }

        .sig-row-editor input:focus, .sig-row-editor select:focus { border-color: #004c54; }

        .field-wrap { display: flex; flex-direction: column; }

        .btn-del {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            border-radius: 7px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: background 0.15s;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .btn-del:hover { background: #fca5a5; }
        .btn-del:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-move {
            background: #e0f2fe;
            color: #0369a1;
            border: none;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
        }
        .btn-move:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: #e2e8f0;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-add:hover { background: #cbd5e1; }

        .btn-export {
            width: 100%;
            max-width: 1150px;
            padding: 14px;
            background: #004c54;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,76,84,0.25);
            transition: background 0.2s;
            margin-bottom: 28px;
        }
        .btn-export:hover { background: #00333a; }

        /* ===================== SIGNAGE PREVIEW ===================== */
        .preview-area {
            width: 100%;
            max-width: 1150px;
            overflow-x: auto;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        #sign-board {
            background: #004c54;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            padding: 22px 36px;
            gap: 0;
            user-select: none;
            min-width: 600px;
        }

        .sign-row {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* Always left-to-right; arrow position is handled by DOM order */
        .sign-row { flex-direction: row; }

        .sign-arrow {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Group of exit icons — always sits between arrow and destination */
        .exits-group {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        /* Individual exit icon wrapper */
        .exit-wrap {
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exit-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .exit-letter {
            position: absolute;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            font-weight: 900;
            color: #000000;
            background-color: #ffcd00;
            padding: 0 2px;
            line-height: 1;
            text-align: center;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .sign-dest {
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            flex: 1;
        }

        .sign-row.arrow-right .sign-dest { text-align: left; }
        .sign-row.arrow-left  .sign-dest { text-align: left; }

        .sign-divider {
            height: 1.5px;
            background: rgba(255,255,255,0.15);
            width: 100%;
        }
    </style>
</head>
<body>

<h1>Direction Signage Generator</h1>
<p class="subtitle">Build wayfinding direction boards — like those seen inside MRT stations. Each row supports multiple exits.</p>

<!-- GLOBAL SETTINGS -->
<div class="panel">
    <div class="panel-title">Board Settings</div>
    <div class="global-grid">
        <div class="ctrl">
            <label>Board Background</label>
            <select id="bgColor">
                <option value="#004c54">Dark Teal (MRT Standard)</option>
                <option value="#000000">Black</option>
                <option value="#1a1a2e">Navy</option>
                <option value="#custom">Custom…</option>
            </select>
            <input type="color" id="bgColorCustom" value="#004c54" style="display:none;margin-top:6px;height:38px;border-radius:8px;border:1px solid #cbd5e1;width:100%;cursor:pointer;padding:0;">
        </div>
        <div class="ctrl">
            <label>Board Width (px): <span id="boardWidthVal">800</span></label>
            <input type="range" id="boardWidth" min="400" max="1800" value="800">
        </div>
        <div class="ctrl">
            <label>Row Height (px): <span id="rowHeightVal">62</span></label>
            <input type="range" id="rowHeight" min="36" max="130" value="62">
        </div>
        <div class="ctrl">
            <label>Board Padding H (px): <span id="boardPadHVal">36</span></label>
            <input type="range" id="boardPadH" min="8" max="90" value="36">
        </div>
        <div class="ctrl">
            <label>Board Padding V (px): <span id="boardPadVVal">22</span></label>
            <input type="range" id="boardPadV" min="4" max="60" value="22">
        </div>
        <div class="ctrl">
            <label>Row Gap (px): <span id="rowGapVal">0</span></label>
            <input type="range" id="rowGap" min="0" max="30" value="0">
        </div>
        <div class="ctrl">
            <label>Destination Font (px): <span id="destFsVal">32</span></label>
            <input type="range" id="destFs" min="14" max="80" value="32">
        </div>
        <div class="ctrl">
            <label>Exit Box Size (px): <span id="exitSzVal">54</span></label>
            <input type="range" id="exitSz" min="28" max="110" value="54">
        </div>
        <div class="ctrl">
            <label>Exit Letter Font (px): <span id="exitFsVal">20</span></label>
            <input type="range" id="exitFs" min="10" max="55" value="20">
        </div>
        <div class="ctrl">
            <label>Gap Between Exits (px): <span id="exitGapVal">6</span></label>
            <input type="range" id="exitGap" min="0" max="30" value="6">
        </div>
        <div class="ctrl">
            <label>Arrow Size (px): <span id="arrowSzVal">42</span></label>
            <input type="range" id="arrowSz" min="18" max="100" value="42">
        </div>
        <div class="ctrl">
            <label>Spacing Between Elements (px): <span id="elemGapVal">16</span></label>
            <input type="range" id="elemGap" min="4" max="50" value="16">
        </div>
        <div class="ctrl">
            <label>Show Divider Lines</label>
            <select id="showDividers">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
    </div>
</div>

<!-- ROW EDITOR -->
<div class="panel">
    <div class="panel-title">Sign Rows</div>
    <div class="rows-wrapper" id="rowsContainer"></div>
    <button class="btn-add" id="addRowBtn">+ Add Row</button>
</div>

<button class="btn-export" id="exportBtn">⬇ Export as PNG</button>

<!-- PREVIEW -->
<div class="preview-area">
    <div id="sign-board"></div>
</div>

<script>
    // ===================== STATE =====================
    // exits is now an ARRAY of strings
    let rows = [
        { direction: 'up',    arrowColor: 'yellow', exits: ['A', 'B'], destination: 'Bukit Timah Rd' },
        { direction: 'up',    arrowColor: 'yellow', exits: ['A'],      destination: 'MacKenzie Rd' },
        { direction: 'right', arrowColor: 'yellow', exits: ['C'],      destination: 'Serangoon Rd / Tekka Ctr' },
        { direction: 'up',    arrowColor: 'yellow', exits: ['E'],      destination: 'Race Course Rd / Buffalo Rd' },
    ];

    const ARROW_RIGHT_DIRS = new Set(['right', 'up-right', 'down-right']);

    const DIR_ROTATION = {
        'up': 0, 'up-right': 45, 'right': 90, 'down-right': 135,
        'down': 180, 'down-left': 225, 'left': 270, 'up-left': 315,
    };

    const DIR_LABELS = {
        'up': '↑ Up', 'up-right': '↗ Up-Right', 'right': '→ Right',
        'down-right': '↘ Down-Right', 'down': '↓ Down',
        'down-left': '↙ Down-Left', 'left': '← Left', 'up-left': '↖ Up-Left',
    };

    // ===================== DOM REFS =====================
    const boardEl       = document.getElementById('sign-board');
    const rowsCont      = document.getElementById('rowsContainer');
    const addRowBtn     = document.getElementById('addRowBtn');
    const bgColorSel    = document.getElementById('bgColor');
    const bgColorCustom = document.getElementById('bgColorCustom');
    const exportBtn     = document.getElementById('exportBtn');
    const showDividers  = document.getElementById('showDividers');

    const sliders = {
        boardWidth: { el: document.getElementById('boardWidth'), disp: document.getElementById('boardWidthVal') },
        rowHeight:  { el: document.getElementById('rowHeight'),  disp: document.getElementById('rowHeightVal') },
        boardPadH:  { el: document.getElementById('boardPadH'),  disp: document.getElementById('boardPadHVal') },
        boardPadV:  { el: document.getElementById('boardPadV'),  disp: document.getElementById('boardPadVVal') },
        rowGap:     { el: document.getElementById('rowGap'),     disp: document.getElementById('rowGapVal') },
        destFs:     { el: document.getElementById('destFs'),     disp: document.getElementById('destFsVal') },
        exitSz:     { el: document.getElementById('exitSz'),     disp: document.getElementById('exitSzVal') },
        exitFs:     { el: document.getElementById('exitFs'),     disp: document.getElementById('exitFsVal') },
        exitGap:    { el: document.getElementById('exitGap'),    disp: document.getElementById('exitGapVal') },
        arrowSz:    { el: document.getElementById('arrowSz'),    disp: document.getElementById('arrowSzVal') },
        elemGap:    { el: document.getElementById('elemGap'),    disp: document.getElementById('elemGapVal') },
    };

    function gs(key) { return parseInt(sliders[key].el.value); }

    // ===================== ARROW SVG =====================
    function arrowSVG(direction, color, size) {
        const c   = color === 'yellow' ? '#FFCD00' : '#FFFFFF';
        const rot = DIR_ROTATION[direction] || 0;
    
        return `
        <svg
            width="${size}"
            height="${size}"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
            style="
                transform: rotate(${rot}deg);
                display:block;
                flex-shrink:0;
            "
        >
            <path
                fill="${c}"
                d="
                    M50 4
                    L94 48
                    L72 48
                    L72 92
                    L50 78
                    L28 92
                    L28 48
                    L6 48
                    Z
                "
            />
        </svg>`;
    }

    // ===================== BUILD ONE EXIT ICON (DOM) =====================
    function buildExitIconEl(letter, eSz, eFs, eGap) {
        const exitWrap = document.createElement('div');
        exitWrap.className = 'exit-wrap';
        exitWrap.style.width    = eSz + 'px';
        exitWrap.style.height   = eSz + 'px';
        exitWrap.style.marginRight = eGap + 'px'; // spacing between consecutive icons

        const exitImg = document.createElement('img');
        exitImg.src       = 'exit_logo.png';
        exitImg.alt       = 'Exit';
        exitImg.className = 'exit-img';

        const exitLetter = document.createElement('div');
        exitLetter.className      = 'exit-letter';
        exitLetter.style.fontSize = eFs + 'px';
        exitLetter.textContent    = letter || '?';

        exitWrap.appendChild(exitImg);
        exitWrap.appendChild(exitLetter);
        return exitWrap;
    }

    // ===================== RENDER SIGN =====================
    function renderSign() {
        const bg      = bgColorSel.value === '#custom' ? bgColorCustom.value : bgColorSel.value;
        const width   = gs('boardWidth');
        const rH      = gs('rowHeight');
        const padH    = gs('boardPadH');
        const padV    = gs('boardPadV');
        const rGap    = gs('rowGap');
        const dFs     = gs('destFs');
        const eSz     = gs('exitSz');
        const eFs     = gs('exitFs');
        const eGap    = gs('exitGap');
        const aSz     = gs('arrowSz');
        const elemGap = gs('elemGap');
        const dividers = showDividers.value === 'yes';

        boardEl.style.backgroundColor = bg;
        boardEl.style.width    = width + 'px';
        boardEl.style.minWidth = width + 'px';
        boardEl.style.padding  = `${padV}px ${padH}px`;
        boardEl.style.gap      = rGap + 'px';

        boardEl.innerHTML = '';

        rows.forEach((row, i) => {
            const onRight = ARROW_RIGHT_DIRS.has(row.direction);

            const rowDiv = document.createElement('div');
            rowDiv.className = `sign-row ${onRight ? 'arrow-right' : 'arrow-left'}`;
            rowDiv.style.height = rH + 'px';
            rowDiv.style.gap    = elemGap + 'px';
            rowDiv.style.width  = '100%';

            // Arrow
            const arrowWrap = document.createElement('div');
            arrowWrap.className = 'sign-arrow';
            arrowWrap.style.width  = aSz + 'px';
            arrowWrap.style.height = aSz + 'px';
            arrowWrap.innerHTML    = arrowSVG(row.direction, row.arrowColor, aSz);

            // Exit icons group — always goes between arrow and destination
            // For right-facing rows the DOM order is reversed (row-reverse flex),
            // so we keep the same DOM order: exits then destination. The flex reversal
            // handles visual placement automatically.
            const exitsGroup = document.createElement('div');
            exitsGroup.className = 'exits-group';
            exitsGroup.style.gap = '0'; // spacing handled per-icon with marginRight

            const exits = row.exits && row.exits.length ? row.exits : ['?'];
            exits.forEach((letter, ei) => {
                const icon = buildExitIconEl(letter, eSz, eFs, ei < exits.length - 1 ? eGap : 0);
                exitsGroup.appendChild(icon);
            });

            // Destination
            const destEl = document.createElement('div');
            destEl.className      = 'sign-dest';
            destEl.style.fontSize = dFs + 'px';
            destEl.textContent    = row.destination;

            if (onRight) {
                // Visual: [Exit][Exit] Destination →
                rowDiv.appendChild(exitsGroup);
                rowDiv.appendChild(destEl);
                rowDiv.appendChild(arrowWrap);
            } else {
                // Visual: ↑ [Exit][Exit] Destination
                rowDiv.appendChild(arrowWrap);
                rowDiv.appendChild(exitsGroup);
                rowDiv.appendChild(destEl);
            }

            boardEl.appendChild(rowDiv);

            if (dividers && i < rows.length - 1) {
                const div = document.createElement('div');
                div.className = 'sign-divider';
                boardEl.appendChild(div);
            }
        });
    }

    // ===================== RENDER CONTROLS =====================
    function renderControls() {
        rowsCont.innerHTML = '';
        rows.forEach((row, i) => {
            const ed = document.createElement('div');
            ed.className = 'sig-row-editor';

            /* ---- TOP ROW: direction, color, move buttons, delete ---- */
            const topRow = document.createElement('div');
            topRow.className = 'row-top';

            // Direction
            const dirWrap = document.createElement('div');
            dirWrap.className = 'field-wrap';
            dirWrap.innerHTML = '<label>Direction</label>';
            const dirSel = document.createElement('select');
            Object.keys(DIR_LABELS).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = DIR_LABELS[d];
                if (d === row.direction) opt.selected = true;
                dirSel.appendChild(opt);
            });
            dirSel.addEventListener('change', e => { rows[i].direction = e.target.value; renderAll(); });
            dirWrap.appendChild(dirSel);

            // Arrow Color
            const acWrap = document.createElement('div');
            acWrap.className = 'field-wrap';
            acWrap.innerHTML = '<label>Arrow Color</label>';
            const acSel = document.createElement('select');
            ['yellow', 'white'].forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
                if (c === row.arrowColor) opt.selected = true;
                acSel.appendChild(opt);
            });
            acSel.addEventListener('change', e => { rows[i].arrowColor = e.target.value; renderSign(); });
            acWrap.appendChild(acSel);

            // Spacer (takes 1fr)
            const spacer = document.createElement('div');

            // Move buttons
            const movePair = document.createElement('div');
            movePair.style.cssText = 'display:flex;gap:4px;align-self:flex-end;';
            const upBtn = document.createElement('button');
            upBtn.className = 'btn-move';
            upBtn.textContent = '↑';
            upBtn.disabled = i === 0;
            upBtn.addEventListener('click', () => { if (i > 0) { [rows[i-1], rows[i]] = [rows[i], rows[i-1]]; renderAll(); } });
            const dnBtn = document.createElement('button');
            dnBtn.className = 'btn-move';
            dnBtn.textContent = '↓';
            dnBtn.disabled = i === rows.length - 1;
            dnBtn.addEventListener('click', () => { if (i < rows.length - 1) { [rows[i], rows[i+1]] = [rows[i+1], rows[i]]; renderAll(); } });
            movePair.appendChild(upBtn);
            movePair.appendChild(dnBtn);

            // Delete
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-del';
            delBtn.textContent = '✕';
            delBtn.disabled = rows.length === 1;
            delBtn.addEventListener('click', () => { rows.splice(i, 1); renderAll(); });

            topRow.appendChild(dirWrap);
            topRow.appendChild(acWrap);
            topRow.appendChild(spacer);
            topRow.appendChild(movePair);
            topRow.appendChild(delBtn);

            /* ---- BOTTOM ROW: exits editor + destination ---- */
            const botRow = document.createElement('div');
            botRow.className = 'row-bottom';

            // Exits area
            const exitsArea = document.createElement('div');
            exitsArea.innerHTML = '<label style="display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;">Exits</label>';
            const exitsFlex = document.createElement('div');
            exitsFlex.className = 'exits-area';

            function rebuildExitTags() {
                exitsFlex.innerHTML = '';
                row.exits.forEach((letter, ei) => {
                    const tag = document.createElement('div');
                    tag.className = 'exit-tag';

                    const inp = document.createElement('input');
                    inp.type = 'text';
                    inp.value = letter;
                    inp.maxLength = 3;
                    inp.addEventListener('input', e => {
                        rows[i].exits[ei] = e.target.value.toUpperCase();
                        renderSign();
                    });

                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'exit-tag-del';
                    removeBtn.textContent = '×';
                    removeBtn.title = 'Remove exit';
                    removeBtn.addEventListener('click', () => {
                        if (rows[i].exits.length > 1) {
                            rows[i].exits.splice(ei, 1);
                            renderAll();
                        }
                    });
                    // Don't allow removing the last exit
                    if (row.exits.length === 1) removeBtn.style.display = 'none';

                    tag.appendChild(inp);
                    tag.appendChild(removeBtn);
                    exitsFlex.appendChild(tag);
                });

                const addExitBtn = document.createElement('button');
                addExitBtn.className = 'btn-add-exit';
                addExitBtn.textContent = '+ Exit';
                addExitBtn.addEventListener('click', () => {
                    rows[i].exits.push('');
                    renderAll();
                });
                exitsFlex.appendChild(addExitBtn);
            }

            rebuildExitTags();
            exitsArea.appendChild(exitsFlex);

            // Destination
            const destWrap = document.createElement('div');
            destWrap.className = 'field-wrap';
            destWrap.innerHTML = '<label>Destination</label>';
            const destInp = document.createElement('input');
            destInp.type = 'text';
            destInp.value = row.destination;
            destInp.placeholder = 'e.g. Bukit Timah Rd';
            destInp.addEventListener('input', e => { rows[i].destination = e.target.value; renderSign(); });
            destWrap.appendChild(destInp);

            botRow.appendChild(exitsArea);
            botRow.appendChild(destWrap);

            ed.appendChild(topRow);
            ed.appendChild(botRow);
            rowsCont.appendChild(ed);
        });
    }

    function renderAll() { renderControls(); renderSign(); }

    // ===================== EVENTS =====================
    addRowBtn.addEventListener('click', () => {
        rows.push({ direction: 'up', arrowColor: 'yellow', exits: ['A'], destination: 'New Destination' });
        renderAll();
    });

    bgColorSel.addEventListener('change', () => {
        bgColorCustom.style.display = bgColorSel.value === '#custom' ? 'block' : 'none';
        renderSign();
    });
    bgColorCustom.addEventListener('input', renderSign);

    Object.values(sliders).forEach(({ el, disp }) => {
        el.addEventListener('input', () => { disp.textContent = el.value; renderSign(); });
    });

    showDividers.addEventListener('change', renderSign);

    exportBtn.addEventListener('click', () => {
        document.fonts.ready.then(() => {
            html2canvas(boardEl, {
                scale: 2,
                logging: false,
                useCORS: true,
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'direction_signage.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    });

    // ===================== INIT =====================
    renderAll();
</script>
</body>
</html>

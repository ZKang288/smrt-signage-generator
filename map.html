<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG MRT Platform Signage Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'MRT-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype'),
                 url('OceanSans.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #0f172a;
        }

        p.subtitle {
            margin: 0 0 30px;
            color: #64748b;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        .editor-regions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .editor-regions { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input,
        .control-group select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input[type="range"] {
            padding: 5px 0;
            cursor: pointer;
        }

        .control-group input:focus,
        .control-group select:focus {
            border-color: #004c54;
        }

        .line-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr auto;
            gap: 10px;
            align-items: center;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-picker-wrapper input[type="color"] {
            padding: 0;
            width: 35px;
            height: 35px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            background: none;
        }

        .btn-action {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-add {
            background-color: #e2e8f0;
            color: #334155;
            width: 100%;
            margin-top: 5px;
        }

        .btn-add:hover:not(:disabled) { background-color: #cbd5e1; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
        }
        .btn-delete:hover { background-color: #fca5a5; }

        .btn-download {
            background-color: #004c54;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,76,84,0.2);
            transition: background 0.2s;
        }

        .btn-download:hover { background-color: #00333a; }

        /* ── Signage preview wrapper ── */
        .signage-wrapper {
            overflow-x: auto;
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* ── The actual platform sign ── */
        #platform-sign {
            position: relative;
            background-color: #1e2433;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            padding: 36px 48px 32px 48px;
            box-sizing: border-box;
            user-select: none;
            white-space: nowrap;
            /* Silver metallic border */
            border: 6px solid transparent;
            border-image: linear-gradient(160deg, #d4d4d4, #8a8a8a, #e8e8e8, #9a9a9a, #c8c8c8) 1;
            box-shadow:
                inset 0 0 0 2px rgba(255,255,255,0.06),
                0 8px 32px rgba(0,0,0,0.45);
        }

        /* Silver corner sparkle (bottom-right, matching reference) */
        #platform-sign::after {
            content: '✦';
            position: absolute;
            bottom: 10px;
            right: 14px;
            color: rgba(200,200,200,0.5);
            font-size: 18px;
        }

        /* ── Top row: caplet + English name ── */
        .sign-top-row {
            display: flex;
            align-items: center;
            gap: 36px;
            margin-bottom: 10px;
        }

        /* ── Station name (English) ── */
        .sign-english {
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            font-size: 80px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        /* ── Secondary names row ── */
        .sign-secondary {
            display: flex;
            align-items: baseline;
            gap: 36px;
        }

        .sign-chinese {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            letter-spacing: 6px;
        }

        .sign-tamil {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Noto Sans Tamil', 'Latha', sans-serif;
        }

        /* ── Caplet (reuses same CSS-rounded approach) ── */
        #sign-caplet-outer {
            display: inline-flex;
            align-items: stretch;
            flex-shrink: 0;
        }

        #sign-caplet-inner {
            display: inline-flex;
            align-items: stretch;
            overflow: hidden;
            box-sizing: border-box;
        }

        .caplet-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            font-size: 32px;
            font-weight: bold;
            white-space: nowrap;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <nav style="margin-bottom: 20px; display: flex; gap: 15px;">
        <a href="index.html" style="color: #64748b; text-decoration: none;">📋 Signage Generator</a>
        <a href="map.html" style="font-weight: bold; color: #004c54; text-decoration: none;">🗺️ Platform Map Generator</a>
    </nav>

    <h1>Singapore MRT Platform Signage Generator</h1>
    <p class="subtitle">Generates the in-platform station name board with English, Chinese, and Tamil</p>

    <div class="container">
        <div class="editor-regions">

            <!-- Left column: station name fields -->
            <div>
                <div class="section-title">Station Name</div>

                <div class="control-group">
                    <label for="nameEnglish">English</label>
                    <input type="text" id="nameEnglish" value="Outram Park">
                </div>

                <div class="control-group">
                    <label for="nameChinese">Chinese (汉字)</label>
                    <input type="text" id="nameChinese" value="欧南园">
                </div>

                <div class="control-group">
                    <label for="nameTamil">Tamil (தமிழ்)</label>
                    <input type="text" id="nameTamil" value="ஊட்ரம் பார்க்">
                </div>

                <div class="section-title" style="margin-top: 24px;">Sign Dimensions</div>

                <div style="display: flex; gap: 25px; margin-bottom: 15px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="autoWidth" checked style="width:auto;cursor:pointer;">
                        <label for="autoWidth" style="font-size:13px;font-weight:600;color:#475569;margin:0;cursor:pointer;">Auto Width</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="showTamil" checked style="width:auto;cursor:pointer;">
                        <label for="showTamil" style="font-size:13px;font-weight:600;color:#475569;margin:0;cursor:pointer;">Show Tamil</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="showChinese" checked style="width:auto;cursor:pointer;">
                        <label for="showChinese" style="font-size:13px;font-weight:600;color:#475569;margin:0;cursor:pointer;">Show Chinese</label>
                    </div>
                </div>

                <div class="control-group" id="widthSliderGroup" style="display:none;">
                    <label for="signWidth">Sign Width: <span id="widthVal">1200px</span></label>
                    <input type="range" id="signWidth" min="600" max="2800" value="1200">
                </div>

                <div class="control-group">
                    <label for="signHeight">Sign Height: <span id="heightVal">220px</span></label>
                    <input type="range" id="signHeight" min="140" max="400" value="220">
                </div>

                <div class="section-title" style="margin-top: 24px;">Font Sizes</div>

                <div class="control-group">
                    <label for="sizeEnglish">English: <span id="sizeEnglishVal">80px</span></label>
                    <input type="range" id="sizeEnglish" min="36" max="140" value="80">
                </div>

                <div class="control-group">
                    <label for="sizeChinese">Chinese: <span id="sizeChineseVal">36px</span></label>
                    <input type="range" id="sizeChinese" min="18" max="80" value="36">
                </div>

                <div class="control-group">
                    <label for="sizeTamil">Tamil: <span id="sizeTamilVal">32px</span></label>
                    <input type="range" id="sizeTamil" min="16" max="72" value="32">
                </div>
            </div>

            <!-- Right column: caplet -->
            <div>
                <div class="section-title">Line Caplet</div>
                <div id="linesContainer"></div>
                <button id="addLineBtn" class="btn-action btn-add">+ Add Interchange Line</button>

                <div class="section-title" style="margin-top: 24px;">Caplet Geometry</div>

                <div class="control-group">
                    <label for="capHeight">Caplet Height: <span id="capHeightVal">72px</span></label>
                    <input type="range" id="capHeight" min="40" max="130" value="72">
                </div>

                <div class="control-group">
                    <label for="capVr">Vertical Radius: <span id="capVrVal">28px</span></label>
                    <input type="range" id="capVr" min="0" max="80" value="28">
                </div>

                <div class="control-group">
                    <label for="capHr">Horizontal Radius: <span id="capHrVal">20px</span></label>
                    <input type="range" id="capHr" min="0" max="160" value="20">
                </div>

                <div class="control-group">
                    <label for="capFontSize">Caplet Font Size: <span id="capFontVal">32px</span></label>
                    <input type="range" id="capFontSize" min="14" max="72" value="32">
                </div>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">Export Signage as PNG</button>
    </div>

    <!-- ── Preview ── -->
    <div class="signage-wrapper">
        <div id="platform-sign">
            <div class="sign-top-row">
                <div id="sign-caplet-outer">
                    <div id="sign-caplet-inner"></div>
                </div>
                <div class="sign-english" id="sign-english">Outram Park</div>
            </div>
            <div class="sign-secondary" id="sign-secondary">
                <div class="sign-chinese" id="sign-chinese">欧 南 园</div>
                <div class="sign-tamil"   id="sign-tamil">ஊட்ரம் பார்க்</div>
            </div>
        </div>
    </div>

    <script>
        // ── Predefined LTA Palette ──
        const standardLines = [
            { name: "North–South Line (NS)",        color: "#d42e12" },
            { name: "Circle Line (CC)",              color: "#fa9e0d" },
            { name: "East–West Line (EW)",           color: "#009645" },
            { name: "North East Line (NE)",          color: "#9900aa" },
            { name: "Downtown Line (DT)",            color: "#005ec4" },
            { name: "Thomson–East Coast Line (TE)",  color: "#9D5B25" },
            { name: "Cross Island Line (CR)",        color: "#97C616" },
            { name: "Jurong Region Line (JW)",       color: "#0099aa" },
            { name: "Branch Line (BP)",              color: "#b85600" },
            { name: "[ Custom Color ]",              color: "#custom"  }
        ];

        let linesState = [
            { code: "NE 3", color: "#9900aa" }
        ];

        // ── DOM refs ──
        const capletOuter   = document.getElementById('sign-caplet-outer');
        const capletInner   = document.getElementById('sign-caplet-inner');
        const signEnglish   = document.getElementById('sign-english');
        const signChinese   = document.getElementById('sign-chinese');
        const signTamil     = document.getElementById('sign-tamil');
        const signSecondary = document.getElementById('sign-secondary');
        const platformSign  = document.getElementById('platform-sign');
        const linesContainer = document.getElementById('linesContainer');
        const addLineBtn    = document.getElementById('addLineBtn');

        const nameEnglish  = document.getElementById('nameEnglish');
        const nameChinese  = document.getElementById('nameChinese');
        const nameTamil    = document.getElementById('nameTamil');
        const autoWidth    = document.getElementById('autoWidth');
        const showTamil    = document.getElementById('showTamil');
        const showChinese  = document.getElementById('showChinese');
        const signWidthInput  = document.getElementById('signWidth');
        const signHeightInput = document.getElementById('signHeight');
        const widthSliderGroup = document.getElementById('widthSliderGroup');
        const widthVal    = document.getElementById('widthVal');
        const heightVal   = document.getElementById('heightVal');

        const sizeEnglishInput = document.getElementById('sizeEnglish');
        const sizeChineseInput = document.getElementById('sizeChinese');
        const sizeTamilInput   = document.getElementById('sizeTamil');
        const sizeEnglishVal   = document.getElementById('sizeEnglishVal');
        const sizeChineseVal   = document.getElementById('sizeChineseVal');
        const sizeTamilVal     = document.getElementById('sizeTamilVal');

        const capHeightInput = document.getElementById('capHeight');
        const capVrInput     = document.getElementById('capVr');
        const capHrInput     = document.getElementById('capHr');
        const capFontInput   = document.getElementById('capFontSize');
        const capHeightVal   = document.getElementById('capHeightVal');
        const capVrVal       = document.getElementById('capVrVal');
        const capHrVal       = document.getElementById('capHrVal');
        const capFontVal     = document.getElementById('capFontVal');

        // ── Contrast helper ──
        function getContrastColor(hex) {
            const lightBg = ["#FA9E0D","#97C616","#0099AA","#FFCD00"];
            if (lightBg.includes(hex.toUpperCase())) return '#000000';
            const h = hex.replace('#','');
            const r = parseInt(h.slice(0,2),16),
                  g = parseInt(h.slice(2,4),16),
                  b = parseInt(h.slice(4,6),16);
            return ((r*299 + g*587 + b*114)/1000 >= 140) ? '#000000' : '#ffffff';
        }

        // ── Render line controls ──
        function renderControls() {
            linesContainer.innerHTML = '';
            linesState.forEach((line, index) => {
                const row = document.createElement('div');
                row.className = 'line-row';

                const select = document.createElement('select');
                let isCustom = true;
                standardLines.forEach(std => {
                    const opt = document.createElement('option');
                    opt.value = std.color;
                    opt.text  = std.name;
                    if (std.color.toUpperCase() === line.color.toUpperCase()) {
                        opt.selected = true;
                        isCustom = false;
                    }
                    select.appendChild(opt);
                });
                if (isCustom) select.value = '#custom';

                const codeInput = document.createElement('input');
                codeInput.type  = 'text';
                codeInput.value = line.code;
                codeInput.placeholder = 'e.g. NE 3';

                const pickerWrapper = document.createElement('div');
                pickerWrapper.className = 'color-picker-wrapper';

                const colorPicker = document.createElement('input');
                colorPicker.type  = 'color';
                colorPicker.value = isCustom ? line.color : '#64748b';
                colorPicker.style.display = isCustom ? 'block' : 'none';

                pickerWrapper.appendChild(select);
                pickerWrapper.appendChild(colorPicker);

                const delBtn = document.createElement('button');
                delBtn.className  = 'btn-action btn-delete';
                delBtn.innerText  = '✕';
                if (linesState.length === 1) delBtn.disabled = true;

                select.addEventListener('change', e => {
                    linesState[index].color = e.target.value === '#custom' ? '#64748b' : e.target.value;
                    colorPicker.style.display = e.target.value === '#custom' ? 'block' : 'none';
                    renderAll();
                });
                colorPicker.addEventListener('input', e => {
                    linesState[index].color = e.target.value;
                    renderSignage();
                });
                codeInput.addEventListener('input', e => {
                    linesState[index].code = e.target.value;
                    renderSignage();
                });
                delBtn.addEventListener('click', () => {
                    linesState.splice(index, 1);
                    renderAll();
                });

                row.appendChild(pickerWrapper);
                row.appendChild(codeInput);
                row.appendChild(delBtn);
                linesContainer.appendChild(row);
            });

            addLineBtn.disabled = linesState.length >= 6;
        }

        // ── Render the signage preview ──
        function renderSignage() {
            // Text content
            signEnglish.textContent = nameEnglish.value;
            signChinese.textContent = nameChinese.value;
            signTamil.textContent   = nameTamil.value;

            // Visibility
            const chineseVisible = showChinese.checked;
            const tamilVisible   = showTamil.checked;
            signChinese.style.display = chineseVisible ? '' : 'none';
            signTamil.style.display   = tamilVisible   ? '' : 'none';
            signSecondary.style.display = (chineseVisible || tamilVisible) ? '' : 'none';

            // Sign dimensions
            if (autoWidth.checked) {
                platformSign.style.width    = 'fit-content';
                platformSign.style.minWidth = 'unset';
                widthSliderGroup.style.display = 'none';
            } else {
                platformSign.style.width    = signWidthInput.value + 'px';
                platformSign.style.minWidth = 'unset';
                widthSliderGroup.style.display = 'flex';
                widthVal.innerText = signWidthInput.value + 'px';
            }
            const H = parseInt(signHeightInput.value);
            platformSign.style.height = H + 'px';
            heightVal.innerText = H + 'px';

            // Font sizes
            const fEn = parseInt(sizeEnglishInput.value);
            const fZh = parseInt(sizeChineseInput.value);
            const fTa = parseInt(sizeTamilInput.value);
            signEnglish.style.fontSize = fEn + 'px';
            signChinese.style.fontSize = fZh + 'px';
            signTamil.style.fontSize   = fTa + 'px';
            sizeEnglishVal.innerText = fEn + 'px';
            sizeChineseVal.innerText = fZh + 'px';
            sizeTamilVal.innerText   = fTa + 'px';

            // ── Caplet geometry ──
            const cH  = parseInt(capHeightInput.value);
            const cVr = parseInt(capVrInput.value);
            const cHr = parseInt(capHrInput.value);
            const cFs = parseInt(capFontInput.value);
            const bw  = 4;
            const radius = `${cHr}px / ${cVr}px`;

            capHeightVal.innerText = cH  + 'px';
            capVrVal.innerText     = cVr + 'px';
            capHrVal.innerText     = cHr + 'px';
            capFontVal.innerText   = cFs + 'px';

            capletOuter.style.padding      = bw + 'px';
            capletOuter.style.background   = '#ffffff';
            capletOuter.style.borderRadius = radius;
            capletOuter.style.overflow     = 'hidden';
            capletOuter.style.boxSizing    = 'border-box';
            capletOuter.style.filter       = 'drop-shadow(0 3px 7px rgba(0,0,0,0.4))';
            capletOuter.style.alignSelf    = 'center';

            capletInner.style.height       = cH + 'px';
            capletInner.style.borderRadius = radius;
            capletInner.style.overflow     = 'hidden';
            capletInner.style.boxSizing    = 'border-box';

            // Rebuild segments
            capletInner.innerHTML = '';
            linesState.forEach((line, i) => {
                const seg = document.createElement('div');
                seg.className = 'caplet-segment';
                seg.textContent = line.code.toUpperCase();
                seg.style.backgroundColor = line.color;
                seg.style.color           = getContrastColor(line.color);
                seg.style.fontSize        = cFs + 'px';
                seg.style.padding         = `0 ${cFs * 0.55}px`;
                seg.style.height          = '100%';
                if (i > 0) seg.style.borderLeft = `${bw}px solid #ffffff`;
                capletInner.appendChild(seg);
            });
        }

        function renderAll() {
            renderControls();
            renderSignage();
        }

        // ── Event listeners ──
        [nameEnglish, nameChinese, nameTamil].forEach(el => el.addEventListener('input', renderSignage));
        [showChinese, showTamil, autoWidth].forEach(el => el.addEventListener('change', renderSignage));
        [signWidthInput, signHeightInput,
         sizeEnglishInput, sizeChineseInput, sizeTamilInput,
         capHeightInput, capVrInput, capHrInput, capFontInput
        ].forEach(el => el.addEventListener('input', renderSignage));

        addLineBtn.addEventListener('click', () => {
            if (linesState.length < 6) {
                linesState.push({ code: 'DT 26', color: '#005ec4' });
                renderAll();
            }
        });

        // ── Init ──
        renderAll();

        // ── Export ──
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const target = document.getElementById('platform-sign');
            document.fonts.ready.then(() => {
                html2canvas(target, {
                    scale: 3,
                    logging: false,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${nameEnglish.value.trim().replace(/\s+/g,'_')}_platform.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            });
        });
    </script>
</body>
</html>

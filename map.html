<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRT Platform Signage Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- Font Setup --- */
        @font-face {
            font-family: 'MRT-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #0f172a;
        }

        p.subtitle {
            margin: 0;
            margin-bottom: 30px;
            color: #64748b;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        /* --- Layout Grid --- */
        .editor-regions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .editor-regions { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input, .control-group select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input[type="range"] {
            padding: 5px 0;
            cursor: pointer;
        }

        .control-group input:focus, .control-group select:focus {
            border-color: #004c54;
        }

        .color-picker-box {
            padding: 0 !important;
            height: 40px;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-download {
            background-color: #1e293b;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
            transition: background 0.2s;
        }

        .btn-download:hover { background-color: #0f172a; }

        /* --- Platform Signage Output Area --- */
        .signage-wrapper {
            overflow-x: auto;
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        #mrt-signage {
            height: 180px; 
            background-color: #141517; /* Dark platform panel background */
            display: flex;
            align-items: center;
            justify-content: center; /* Centered alignment for components */
            padding: 0 40px;
            gap: 40px; 
            box-sizing: border-box;
            user-select: none;
            white-space: nowrap;
        }

        .code-segment {
            font-weight: bold;
            font-family: 'MRT-Identity', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            white-space: nowrap;
            box-sizing: border-box;
        }

        /* Name Blocks */
        .text-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .station-en {
            color: #ffffff;
            font-size: 56px; 
            font-weight: 500;
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            line-height: 1.1;
        }

        .translations-row {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }

        .station-translation {
            color: #ffffff;
            font-size: 26px;
            font-family: 'MRT-Identity', 'Arial', sans-serif;
            font-weight: normal;
            opacity: 0.95;
        }
    </style>
</head>
<body>

    <nav style="margin-bottom: 20px; display: flex; gap: 15px;">
        <a href="index.html" style="color: #64748b; text-decoration: none;">📋 Signage Generator</a>
        <a href="map.html" style="font-weight: bold; color: #141517; text-decoration: none;">🗺️ Platform Signage Generator</a>
    </nav>

    <h1>MRT Platform Signage Generator</h1>
    <p class="subtitle">Generates accurate dark-panel platform signs with multi-language script support</p>

    <div class="container">
        <div class="editor-regions">
            <div>
                <div class="section-title">Station Names (Multi-Language)</div>
                <div class="control-group">
                    <label for="stationEn">English Name</label>
                    <input type="text" id="stationEn" value="Outram Park">
                </div>
                <div class="control-group">
                    <label for="stationZh">Chinese Name (简体中文)</label>
                    <input type="text" id="stationZh" value="欧南园">
                </div>
                <div class="control-group">
                    <label for="stationTa">Tamil Name (தமிழ்)</label>
                    <input type="text" id="stationTa" value="ஊட்ரம் பார்க்">
                </div>
                
                <div class="section-title" style="margin-top: 20px;">Signboard Framework</div>
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                    <input type="checkbox" id="autoWidth" style="width: auto; cursor: pointer;">
                    <label for="autoWidth" style="font-size: 13px; font-weight: 600; color: #475569; margin: 0; cursor: pointer;">Auto Calculate Panel Width</label>
                </div>
                <div class="control-group" id="widthSliderGroup">
                    <label for="signageWidth">Custom Width (500px - 1200px): <span id="widthVal">600px</span></label>
                    <input type="range" id="signageWidth" min="500" max="1200" value="600">
                </div>
            </div>

            <div>
                <div class="section-title">Line Configuration</div>
                <div class="control-group">
                    <label for="lineSelect">Primary System Line</label>
                    <select id="lineSelect"></select>
                    <input type="color" id="lineColorPicker" class="color-picker-box" value="#64748b" style="display: none;">
                </div>
                <div class="control-group">
                    <label for="stationCode">Station Numeric Code</label>
                    <input type="text" id="stationCode" value="NE 3">
                </div>

                <div class="section-title" style="margin-top: 25px;">Capsule Geometry & Typography</div>
                <div class="control-group">
                    <label for="capsuleFontSize">Caplet Font Size: <span id="fontSizeVal">34px</span></label>
                    <input type="range" id="capsuleFontSize" min="16" max="60" value="34">
                </div>
                <div class="control-group">
                    <label for="capsulePadding">Capsule Length (Horizontal Padding): <span id="paddingVal">25px</span></label>
                    <input type="range" id="capsulePadding" min="10" max="100" value="25">
                </div>
                <div class="control-group">
                    <label for="capsuleHeight">Capsule Height: <span id="heightVal">78px</span></label>
                    <input type="range" id="capsuleHeight" min="50" max="130" value="78">
                </div>
                <div class="control-group">
                    <label for="capsuleRoundness">Vertical Radius (Vr): <span id="roundnessVal">50px</span></label>
                    <input type="range" id="capsuleRoundness" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <label for="capsuleHRadius">Horizontal Radius (Hr): <span id="hradiusVal">25px</span></label>
                    <input type="range" id="capsuleHRadius" min="0" max="160" value="25">
                </div>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">Export Platform Signage as PNG</button>
    </div>

    <div class="signage-wrapper">
        <div id="mrt-signage">
            <div id="interchangeCapsule" style="display: inline-flex; align-items: center; position: relative; box-sizing: border-box;">
                <div id="capsuleInner" style="display: inline-flex; box-sizing: border-box;"></div>
            </div>
            
            <div class="text-block">
                <div class="station-en" id="signageEn">Outram Park</div>
                <div class="translations-row">
                    <div class="station-translation" id="signageZh">欧南园</div>
                    <div class="station-translation" id="signageTa">ஊட்ரம் பார்க்</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const standardLines = [
            { name: "North East Line (NE)", color: "#9900aa" },
            { name: "North–South Line (NS)", color: "#d42e12" },
            { name: "East–West Line (EW)", color: "#009645" },
            { name: "Circle Line (CC)", color: "#fa9e0d" },
            { name: "Downtown Line (DT)", color: "#005ec4" },
            { name: "Thomson–East Coast Line (TE)", color: "#9D5B25" },
            { name: "Cross Island Line (CR)", color: "#97C616" },
            { name: "Jurong Region Line (JW)", color: "#0099aa" },
            { name: "[ Custom Color ]", color: "#custom" }
        ];

        // UI Element Selectors
        const lineSelect = document.getElementById('lineSelect');
        const lineColorPicker = document.getElementById('lineColorPicker');
        const stationCodeInput = document.getElementById('stationCode');
        const stationEnInput = document.getElementById('stationEn');
        const stationZhInput = document.getElementById('stationZh');
        const stationTaInput = document.getElementById('stationTa');
        
        const outerCapsule = document.getElementById('interchangeCapsule');
        const innerCapsule = document.getElementById('capsuleInner');
        const signageEn = document.getElementById('signageEn');
        const signageZh = document.getElementById('signageZh');
        const signageTa = document.getElementById('signageTa');
        
        const mrtSignage = document.getElementById('mrt-signage');
        const autoWidth = document.getElementById('autoWidth');
        const widthSliderGroup = document.getElementById('widthSliderGroup');
        const signageWidthInput = document.getElementById('signageWidth');
        const widthVal = document.getElementById('widthVal');

        const capsuleFontSizeInput = document.getElementById('capsuleFontSize');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const capsulePaddingInput = document.getElementById('capsulePadding');
        const paddingVal = document.getElementById('paddingVal');
        const capsuleHeightInput = document.getElementById('capsuleHeight');
        const capsuleRoundnessInput = document.getElementById('capsuleRoundness');
        const capsuleHRadiusInput = document.getElementById('capsuleHRadius');
        const heightVal = document.getElementById('heightVal');
        const roundnessVal = document.getElementById('roundnessVal');
        const hradiusVal = document.getElementById('hradiusVal');

        // Populate Line Selector Options
        standardLines.forEach(line => {
            const opt = document.createElement('option');
            opt.value = line.color;
            opt.text = line.name;
            lineSelect.appendChild(opt);
        });

        function getContrastColor(hexColor) {
            const darkTextLines = ["#FA9E0D", "#97C616", "#0099AA", "#FFCD00"];
            if (darkTextLines.includes(hexColor.toUpperCase())) return '#000000';
            
            const hex = hexColor.replace('#', '');
            if (hex.length === 6) {
                const r = parseInt(hex.substring(0, 2), 16);
                const g = parseInt(hex.substring(2, 4), 16);
                const b = parseInt(hex.substring(4, 6), 16);
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                return (yiq >= 140) ? '#000000' : '#ffffff';
            }
            return '#ffffff';
        }

        function updateSignage() {
            // Layout Framework Dimensions
            if (autoWidth.checked) {
                mrtSignage.style.width = 'fit-content';
                mrtSignage.style.minWidth = '500px';
                widthSliderGroup.style.display = 'none';
            } else {
                mrtSignage.style.width = signageWidthInput.value + 'px';
                mrtSignage.style.minWidth = 'unset';
                widthSliderGroup.style.display = 'flex';
                widthVal.innerText = signageWidthInput.value + 'px';
            }

            // Sync Text Content
            signageEn.innerText = stationEnInput.value;
            signageZh.innerText = stationZhInput.value;
            signageTa.innerText = stationTaInput.value;

            // Geometry Configuration Variables
            const H = parseInt(capsuleHeightInput.value);
            const P = parseInt(capsulePaddingInput.value);
            const Fs = parseInt(capsuleFontSizeInput.value);
            const minVr = Math.ceil(H / 2);
            
            capsuleRoundnessInput.min = minVr;
            if (parseInt(capsuleRoundnessInput.value) < minVr) {
                capsuleRoundnessInput.value = minVr;
            }

            const Vr = parseInt(capsuleRoundnessInput.value);
            const Hr = parseInt(capsuleHRadiusInput.value);

            // Update Control Labels
            heightVal.innerText = H + 'px';
            paddingVal.innerText = P + 'px';
            fontSizeVal.innerText = Fs + 'px';
            roundnessVal.innerText = Vr + 'px';
            hradiusVal.innerText = Hr + 'px';

            const borderW = 4;
            const radius = `${Hr}px / ${Vr}px`;

            // Style Outer Capsule Frame
            outerCapsule.style.padding = borderW + 'px';
            outerCapsule.style.background = '#ffffff';
            outerCapsule.style.borderRadius = radius;
            outerCapsule.style.overflow = 'hidden';
            outerCapsule.style.boxSizing = 'border-box';
            
            // Style Inner Core Content Panel
            innerCapsule.style.height = H + 'px';
            innerCapsule.style.borderRadius = radius;
            innerCapsule.style.overflow = 'hidden';
            innerCapsule.style.boxSizing = 'border-box';
            innerCapsule.innerHTML = '';

            // Extract Active Color Configuration
            const activeColor = (lineSelect.value === '#custom') ? lineColorPicker.value : lineSelect.value;

            // Generate Capsule Text Segment with Variable Padding and Font Size
            const segment = document.createElement('div');
            segment.className = 'code-segment';
            segment.innerText = stationCodeInput.value.toUpperCase();
            segment.style.backgroundColor = activeColor;
            segment.style.color = getContrastColor(activeColor);
            segment.style.fontSize = Fs + 'px';
            segment.style.paddingLeft = P + 'px';
            segment.style.paddingRight = P + 'px';
            segment.style.height = '100%';

            innerCapsule.appendChild(segment);
        }

        // Toggle Custom Color Picker Display Logic
        lineSelect.addEventListener('change', (e) => {
            if (e.target.value === '#custom') {
                lineColorPicker.style.display = 'block';
            } else {
                lineColorPicker.style.display = 'none';
            }
            updateSignage();
        });

        // Configuration Event Bindings
        lineColorPicker.addEventListener('input', updateSignage);
        stationEnInput.addEventListener('input', updateSignage);
        stationZhInput.addEventListener('input', updateSignage);
        stationTaInput.addEventListener('input', updateSignage);
        stationCodeInput.addEventListener('input', updateSignage);
        autoWidth.addEventListener('change', updateSignage);
        signageWidthInput.addEventListener('input', updateSignage);
        capsuleFontSizeInput.addEventListener('input', updateSignage);
        capsulePaddingInput.addEventListener('input', updateSignage);
        capsuleHeightInput.addEventListener('input', updateSignage);
        capsuleRoundnessInput.addEventListener('input', updateSignage);
        capsuleHRadiusInput.addEventListener('input', updateSignage);

        // Run Initial Compilation
        updateSignage();

        // Canvas Capture Processing Engine
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const target = document.getElementById('mrt-signage');
            document.fonts.ready.then(() => {
                html2canvas(target, {
                    scale: 2, 
                    logging: false,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const downloadLink = document.createElement('a');
                    downloadLink.download = `${stationEnInput.value.trim().replace(/\s+/g, '_')}_platform_sign.png`;
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.click();
                });
            });
        });
    </script>
</body>
</html>

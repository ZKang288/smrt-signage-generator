<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive MRT Signboard Generator</title>
    <style>
        /* Base Styling & Theme Variables */
        :root {
            --line-color: #9900aa; /* Default: NE Line Purple */
            --sign-bg: #121212;    /* Dark matte background */
            --text-main: #ffffff;
        }

        body {
            background-color: #1c1c1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            max-width: 750px;
            width: 100%;
        }

        /* Navigation Styling Overrides for Dark Mode Harmony */
        nav a {
            transition: opacity 0.2s ease;
            font-size: 0.95rem;
        }
        nav a:hover {
            opacity: 0.8;
        }

        /* --- THE SIGNBOARD COMPONENT --- */
        .mrt-signboard {
            width: 100%;
            background-color: var(--sign-bg);
            border-radius: 6px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 1px solid #2c2c2e;
            margin-bottom: 30px;
        }

        .sign-body {
            display: flex;
            align-items: center;
            padding: 30px 40px;
            gap: 28px;
        }

        /* Station Code Capsule */
        .station-badge {
            background-color: var(--line-color);
            border: 4px solid var(--text-main);
            border-radius: 40px;
            padding: 6px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 95px;
            height: 55px;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        .station-code {
            color: var(--text-main);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        /* Typography Wrapper */
        .station-names {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* English Name */
        .name-en {
            color: var(--text-main);
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        /* Secondary Languages */
        .name-secondary {
            color: var(--text-main);
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            gap: 20px;
            align-items: center;
            opacity: 0.9;
        }

        .name-zh {
            font-family: "PingFang SC", "Heiti SC", "Microsoft YaHei", sans-serif;
            font-weight: 600;
        }

        .name-ta {
            font-family: "Latha", "Tamil Sangam MN", sans-serif;
        }

        /* --- INTERACTIVE CONTROL PANEL --- */
        .control-panel {
            background: #2c2c2e;
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .control-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            border-bottom: 1px solid #48484a;
            padding-bottom: 10px;
            color: #ff9500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #aeaeb2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .input-group input {
            background: #3a3a3c;
            border: 1px solid #48484a;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #ff9500;
        }

        .input-group input[type="color"] {
            padding: 2px;
            height: 40px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <nav style="margin-bottom: 20px; display: flex; gap: 15px;">
            <a href="index.html" style="font-weight: bold; color: #ff9500; text-decoration: none;">📋 Signage Generator</a>
            <a href="map.html" style="color: #aeaeb2; text-decoration: none;">🗺️ Platform Generator</a>
        </nav>
        
        <div class="mrt-signboard">
            <div class="sign-body">
                <div class="station-badge">
                    <span class="station-code" id="preview-code">NE3</span>
                </div>
                <div class="station-names">
                    <div class="name-en" id="preview-en">Outram Park</div>
                    <div class="name-secondary">
                        <span class="name-zh" id="preview-zh">欧南园</span>
                        <span class="name-ta" id="preview-ta">ஊட்ரம் பார்க்</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h2>Signboard Customizer</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="input-code">Station Code</label>
                    <input type="text" id="input-code" value="NE3" maxlength="5">
                </div>
                <div class="input-group">
                    <label for="input-color">Line Color</label>
                    <input type="color" id="input-color" value="#9900aa">
                </div>
                <div class="input-group">
                    <label for="input-en">English Name</label>
                    <input type="text" id="input-en" value="Outram Park">
                </div>
                <div class="input-group">
                    <label for="input-zh">Chinese Name</label>
                    <input type="text" id="input-zh" value="欧南园">
                </div>
                <div class="input-group">
                    <label for="input-ta">Tamil Name</label>
                    <input type="text" id="input-ta" value="ஊட்ரம் பார்க்">
                </div>
            </div>
        </div>

    </div>

    <script>
        const inputCode = document.getElementById('input-code');
        const inputColor = document.getElementById('input-color');
        const inputEn = document.getElementById('input-en');
        const inputZh = document.getElementById('input-zh');
        const inputTa = document.getElementById('input-ta');

        const previewCode = document.getElementById('preview-code');
        const previewEn = document.getElementById('preview-en');
        const previewZh = document.getElementById('preview-zh');
        const previewTa = document.getElementById('preview-ta');

        // Update Text Elements dynamically
        inputCode.addEventListener('input', (e) => previewCode.textContent = e.target.value.toUpperCase());
        inputEn.addEventListener('input', (e) => previewEn.textContent = e.target.value);
        inputZh.addEventListener('input', (e) => previewZh.textContent = e.target.value);
        inputTa.addEventListener('input', (e) => previewTa.textContent = e.target.value);

        // Update CSS custom variable for the background color theme
        inputColor.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--line-color', e.target.value);
        });
    </script>

</body>
</html>

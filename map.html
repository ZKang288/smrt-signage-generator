<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Signage Station Name</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- Official LTA Typographic Profile --- */
        @font-face {
            font-family: 'LTA-Identity';
            src: url('LTA_Identity-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #0f172a;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: #0f172a;
        }

        p.subtitle {
            margin: 0 0 25px 0;
            color: #64748b;
            font-size: 14px;
        }

        /* --- Mode Switcher Tabs --- */
        .mode-switcher {
            display: flex;
            background: #e2e8f0;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 25px;
            gap: 4px;
        }

        .tab-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #004c54;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.04);
            margin-bottom: 35px;
            box-sizing: border-box;
        }

        .editor-regions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 25px;
        }

        @media (max-width: 850px) {
            .editor-regions { grid-template-columns: 1fr; gap: 25px; }
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 6px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input, .control-group select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        .control-group input:focus, .control-group select:focus {
            border-color: #004c54;
        }

        .control-group input[type="range"] { padding: 5px 0; cursor: pointer; }

        .inline-checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
        }

        /* --- Dynamic Control Rows --- */
        .dynamic-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr auto;
            gap: 10px;
            align-items: center;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .color-picker-wrapper { display: flex; gap: 8px; align-items: center; }
        .color-picker-wrapper input[type="color"] {
            padding: 0; width: 35px; height: 35px; border: none; cursor: pointer; background: none;
        }

        .btn-action {
            padding: 10px 14px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-add { background-color: #f1f5f9; color: #334155; width: 100%; border: 1px dashed #cbd5e1; }
        .btn-add:hover { background-color: #e2e8f0; }
        .btn-delete { background-color: #fee2e2; color: #ef4444; }
        .btn-delete:hover { background-color: #fca5a5; }

        .btn-download {
            background-color: #004c54; color: white; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 76, 84, 0.15); transition: background 0.2s;
        }
        .btn-download:hover { background-color: #00383e; }

        /* --- WYSIWYG Signage Output Canvas --- */
        .signage-wrapper {
            overflow-x: auto; width: 100%; padding: 20px 0; display: flex; justify-content: center;
        }

        #mrt-signage {
            height: 160px; 
            background-color: #111827; /* Standard architectural backing board */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            gap: 50px; 
            box-sizing: border-box;
            user-select: none;
            white-space: nowrap;
            position: relative;
        }

        .left-composite { display: flex; align-items: center; gap: 25px; flex-shrink: 0; }

        /* Typography Profile layouts */
        .text-stack {
            display: flex; flex-direction: column; justify-content: center;
            font-family: 'LTA-Identity', 'Segoe UI', Arial, sans-serif; color: #ffffff;
        }
        .primary-lang { font-size: 42px; font-weight: 500; line-height: 1.1; letter-spacing: 0.5px; }
        .secondary-langs { display: flex; gap: 15px; font-size: 20px; font-weight: 500; margin-top: 4px; color: #cbd5e1; }

        .code-segment {
            font-size: 24px; font-weight: 700; font-family: 'LTA-Identity', 'Arial Black', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100%; padding: 0 16px; box-sizing: border-box;
        }

        /* Standard Exit Layout Block Component */
        .exit-container {
            width: 65px; height: 65px; background-color: #ffcd00; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; flex-shrink: 0; color: #000000; font-family: 'LTA-Identity', 'Arial Black', sans-serif;
        }
        .exit-lbl { font-size: 11px; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .exit-id { font-size: 32px; font-weight: 900; line-height: 0.9; }

        /* --- Exit Directional Mode Explicit Canvas Rules --- */
        #mrt-signage.exit-sign-mode {
            background-color: #1e293b; /* Alternate dark green/gray style background */
            justify-content: flex-start;
            gap: 30px;
        }
        .directional-arrow {
            font-size: 52px; color: #ffffff; font-family: 'LTA-Identity', Arial, sans-serif;
            display: flex; align-items: center; justify-content: center; margin-right: 10px;
        }
        .destinations-list {
            display: flex; flex-direction: column; gap: 2px; color: #ffffff;
            font-family: 'LTA-Identity', 'Segoe UI', Arial, sans-serif; text-align: left;
        }
        .dest-item { font-size: 26px; font-weight: 500; letter-spacing: 0.5px; }
        .dest-sub { font-size: 16px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Platform Signage Station Name</h1>
    <p class="subtitle">Unified configuration tool supporting structural layouts for architectural station signs.</p>

    <div class="mode-switcher">
        <button class="tab-btn active" id="btnModeStation" onclick="switchMode('station')">📋 Station Name Panel</button>
        <button class="tab-btn" id="btnModeExit" onclick="switchMode('exit')">🚪 Exit Directional Sign</button>
    </div>

    <div class="container">
        <div class="editor-regions" id="controlsStation">
            <div>
                <div class="section-title">Station Nomenclature</div>
                <div class="control-group">
                    <label for="langEn">English (Primary)</label>
                    <input type="text" id="langEn" value="Outram Park">
                </div>
                <div class="control-group">
                    <label for="langZh">Chinese (Simplified)</label>
                    <input type="text" id="langZh" value="欧南园">
                </div>
                <div class="control-group">
                    <label for="langTa">Tamil / Alternative Script</label>
                    <input type="text" id="langTa" value="ஊட்ரம் பார்க்">
                </div>
                
                <div class="inline-checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" id="showExit" checked> Display Exit Box</label>
                    <label class="checkbox-label"><input type="checkbox" id="autoWidth" checked> Auto Width Scaling</label>
                </div>
                <div class="control-group" id="exitInputGroup">
                    <label for="exitNumber">Exit Identifier</label>
                    <input type="text" id="exitNumber" value="A">
                </div>
                <div class="control-group" id="widthSliderGroup" style="display: none;">
                    <label for="signageWidth">Custom Fixed Width: <span id="widthVal">1000px</span></label>
                    <input type="range" id="signageWidth" min="600" max="2200" value="1000">
                </div>
            </div>

            <div>
                <div class="section-title">Capsule Geometry Specification</div>
                <div class="control-group">
                    <label for="capsuleHeight">Total Capsule Height ($H$): <span id="heightVal">54px</span></label>
                    <input type="range" id="capsuleHeight" min="40" max="100" value="54">
                </div>
                <div class="control-group">
                    <label for="capsuleRoundness">Vertical Semi-Axis ($V_r$): <span id="roundnessVal">27px</span></label>
                    <input type="range" id="capsuleRoundness" min="20" max="50" value="27">
                </div>
                <div class="control-group">
                    <label for="capsuleHRadius">Horizontal Semi-Axis ($H_r$): <span id="hradiusVal">27px</span></label>
                    <input type="range" id="capsuleHRadius" min="10" max="120" value="27">
                </div>

                <div class="section-title" style="margin-top: 20px;">Transit Network Line Mapping</div>
                <div id="linesContainer"></div>
                <button id="addLineBtn" class="btn-action btn-add">+ Append Station Transit Code</button>
            </div>
        </div>

        <div class="editor-regions" id="controlsExit" style="display: none;">
            <div>
                <div class="section-title">Exit Gateway Identity</div>
                <div class="control-group">
                    <label for="exitSignLetter">Exit Label Designation</label>
                    <input type="text" id="exitSignLetter" value="B">
                </div>
                <div class="control-group">
                    <label for="exitArrow">Directional Orientation Arrow</label>
                    <select id="exitArrow">
                        <option value="←">Left (←)</option>
                        <option value="→">Right (→)</option>
                        <option value="↑">Straight Ahead (↑)</option>
                        <option value="">No Arrow</option>
                    </select>
                </div>
            </div>
            <div>
                <div class="section-title">Wayfinding Destinations List</div>
                <div class="control-group">
                    <label for="destLine1">Primary Destination (Line 1)</label>
                    <input type="text" id="destLine1" value="Outram Road">
                </div>
                <div class="control-group">
                    <label for="destLine2">Secondary Location / Subtext (Line 2)</label>
                    <input type="text" id="destLine2" value="Singapore General Hospital">
                </div>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">Export Production Vector PNG</button>
    </div>

    <div class="signage-wrapper">
        <div id="mrt-signage">
            </div>
    </div>

    <script>
        let currentMode = 'station'; // State machine tracks 'station' | 'exit'

        const officialRegistry = [
            { name: "North–South Line (NS)", color: "#d42e12" },
            { name: "East–West Line (EW)", color: "#009645" },
            { name: "North East Line (NE)", color: "#9900aa" },
            { name: "Circle Line (CC)", color: "#fa9e0d" },
            { name: "Downtown Line (DT)", color: "#005ec4" },
            { name: "Thomson–East Coast Line (TE)", color: "#9d5b25" },
            { name: "[ Custom Color Assignment ]", color: "#custom" }
        ];

        let activeLines = [{ code: "NE 3", color: "#9900aa" }];

        // Core Layout Pipeline Driver
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnModeStation').classList.toggle('active', mode === 'station');
            document.getElementById('btnModeExit').classList.toggle('active', mode === 'exit');
            document.getElementById('controlsStation').style.display = mode === 'station' ? 'grid' : 'none';
            document.getElementById('controlsExit').style.display = mode === 'exit' ? 'grid' : 'none';
            syncCanvasView();
        }

        function getContrastColor(hex) {
            const darkClips = ["#FA9E0D", "#97C616", "#0099AA", "#FFCD00"];
            if (darkClips.includes(hex.toUpperCase())) return '#000000';
            const cleanHex = hex.replace('#', '');
            const r = parseInt(cleanHex.substring(0, 2), 16);
            const g = parseInt(cleanHex.substring(2, 4), 16);
            const b = parseInt(cleanHex.substring(4, 6), 16);
            return (((r * 299) + (g * 587) + (b * 114)) / 1000) >= 145 ? '#000000' : '#ffffff';
        }

        function renderInterfaceControls() {
            const container = document.getElementById('linesContainer');
            container.innerHTML = '';
            activeLines.forEach((line, index) => {
                const row = document.createElement('div');
                row.className = 'dynamic-row';

                const select = document.createElement('select');
                let isCustom = true;
                officialRegistry.forEach(std => {
                    const opt = document.createElement('option');
                    opt.value = std.color; opt.text = std.name;
                    if (std.color.toUpperCase() === line.color.toUpperCase()) { opt.selected = true; isCustom = false; }
                    select.appendChild(opt);
                });
                if (isCustom && line.color !== "#custom") select.value = "#custom";

                const codeInput = document.createElement('input');
                codeInput.type = 'text'; codeInput.value = line.code;

                const pickerWrapper = document.createElement('div');
                pickerWrapper.className = 'color-picker-wrapper';
                const colorPicker = document.createElement('input');
                colorPicker.type = 'color'; colorPicker.value = isCustom ? line.color : "#64748b";
                colorPicker.style.display = isCustom ? 'block' : 'none';

                pickerWrapper.appendChild(select);
                pickerWrapper.appendChild(colorPicker);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-action btn-delete'; delBtn.innerText = '✕';
                if (activeLines.length === 1) delBtn.disabled = true;

                select.addEventListener('change', (e) => {
                    activeLines[index].color = (e.target.value === '#custom') ? '#64748b' : e.target.value;
                    renderPipeline();
                });
                colorPicker.addEventListener('input', (e) => { activeLines[index].color = e.target.value; syncCanvasView(); });
                codeInput.addEventListener('input', (e) => { activeLines[index].code = e.target.value; syncCanvasView(); });
                delBtn.addEventListener('click', () => { activeLines.splice(index, 1); renderPipeline(); });

                row.appendChild(pickerWrapper); row.appendChild(codeInput); row.appendChild(delBtn);
                container.appendChild(row);
            });
        }

        function syncCanvasView() {
            const canvas = document.getElementById('mrt-signage');
            canvas.innerHTML = ''; // Re-flush canvas DOM elements

            if (currentMode === 'station') {
                canvas.className = '';
                canvas.style.backgroundColor = '#111827';
                
                // Read control fields
                const showExit = document.getElementById('showExit').checked;
                const autoWidth = document.getElementById('autoWidth').checked;
                const fixedWidth = document.getElementById('signageWidth').value;

                if (autoWidth) {
                    canvas.style.width = 'fit-content'; canvas.style.minWidth = '950px';
                    document.getElementById('widthSliderGroup').style.display = 'none';
                } else {
                    canvas.style.width = fixedWidth + 'px'; canvas.style.minWidth = 'unset';
                    document.getElementById('widthSliderGroup').style.display = 'flex';
                    document.getElementById('widthVal').innerText = fixedWidth + 'px';
                }

                // Construct layout nodes dynamically
                const leftComposite = document.createElement('div');
                leftComposite.className = 'left-composite';

                // Vector Transit Emblem logo markup
                leftComposite.innerHTML = `
                    <svg style="height: 52px; width: auto; display: block;" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="46" stroke="#ffffff" stroke-width="8"/>
                        <path d="M22 65 L38 35 L62 35 L78 65" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M26 45 L74 45" stroke="#ffffff" stroke-width="7"/>
                    </svg>
                `;

                // Geometry math evaluations for Capsule bounds
                const H = parseInt(document.getElementById('capsuleHeight').value);
                const minVr = Math.ceil(H / 2);
                document.getElementById('capsuleRoundness').min = minVr;
                if (parseInt(document.getElementById('capsuleRoundness').value) < minVr) {
                    document.getElementById('capsuleRoundness').value = minVr;
                }
                const Vr = parseInt(document.getElementById('capsuleRoundness').value);
                const Hr = parseInt(document.getElementById('capsuleHRadius').value);

                document.getElementById('heightVal').innerText = H + 'px';
                document.getElementById('roundnessVal').innerText = Vr + 'px';
                document.getElementById('hradiusVal').innerText = Hr + 'px';

                const outerCapsule = document.createElement('div');
                outerCapsule.style.cssText = `display: inline-flex; align-items: center; padding: 3px; background: #ffffff; border-radius: ${Hr}px / ${Vr}px; overflow: hidden;`;
                
                const innerCapsule = document.createElement('div');
                innerCapsule.style.cssText = `display: inline-flex; align-items: center; height: ${H}px; border-radius: ${Hr}px / ${Vr}px; overflow: hidden;`;

                activeLines.forEach((line, idx) => {
                    const segment = document.createElement('div');
                    segment.className = 'code-segment';
                    segment.innerText = line.code.toUpperCase();
                    segment.style.backgroundColor = line.color;
                    segment.style.color = getContrastColor(line.color);
                    if (idx > 0) segment.style.borderLeft = '3px solid #ffffff';
                    innerCapsule.appendChild(segment);
                });
                outerCapsule.appendChild(innerCapsule);
                leftComposite.appendChild(outerCapsule);

                // Add textual stack
                const textStack = document.createElement('div');
                textStack.className = 'text-stack';
                textStack.innerHTML = `
                    <div class="primary-lang">${document.getElementById('langEn').value}</div>
                    <div class="secondary-langs">
                        <span>${document.getElementById('langZh').value}</span>
                        <span>${document.getElementById('langTa').value}</span>
                    </div>
                `;
                leftComposite.appendChild(textStack);
                canvas.appendChild(leftComposite);

                // Add Exit Graphic widget conditionally
                if (showExit) {
                    const exitWidget = document.createElement('div');
                    exitWidget.className = 'exit-container';
                    exitWidget.innerHTML = `
                        <span class="exit-lbl">Exit</span>
                        <span class="exit-id">${document.getElementById('exitNumber').value.toUpperCase()}</span>
                    `;
                    canvas.appendChild(exitWidget);
                }
            } else {
                // --- RENDERING ROUTINE: EXIT DIRECTIONAL SIGN MODE ---
                canvas.className = 'exit-sign-mode';
                canvas.style.width = 'fit-content';
                canvas.style.minWidth = '900px';
                canvas.style.backgroundColor = '#012e35'; // Accurate green exit architectural tone

                const arrowStr = document.getElementById('exitArrow').value;
                if (arrowStr) {
                    const arrowNode = document.createElement('div');
                    arrowNode.className = 'directional-arrow';
                    arrowNode.innerText = arrowStr;
                    canvas.appendChild(arrowNode);
                }

                const exitWidget = document.createElement('div');
                exitWidget.className = 'exit-container';
                exitWidget.innerHTML = `
                    <span class="exit-lbl">Exit</span>
                    <span class="exit-id">${document.getElementById('exitSignLetter').value.toUpperCase()}</span>
                `;
                canvas.appendChild(exitWidget);

                const destinationsList = document.createElement('div');
                destinationsList.className = 'destinations-list';
                destinationsList.innerHTML = `
                    <div class="dest-item">${document.getElementById('destLine1').value}</div>
                    <div class="dest-sub">${document.getElementById('destLine2').value}</div>
                `;
                canvas.appendChild(destinationsList);
            }
        }

        function renderPipeline() {
            renderInterfaceControls();
            syncCanvasView();
        }

        // Setup Event Hook Bindings
        document.getElementById('addLineBtn').addEventListener('click', () => {
            if (activeLines.length < 10) {
                activeLines.push({ code: "EW 16", color: "#009645" });
                renderPipeline();
            }
        });

        const inputs = [
            'langEn', 'langZh', 'langTa', 'exitNumber', 'showExit', 'autoWidth', 'signageWidth',
            'capsuleHeight', 'capsuleRoundness', 'capsuleHRadius', 'exitSignLetter', 'exitArrow',
            'destLine1', 'destLine2'
        ];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', syncCanvasView));

        // Initializer sequence call
        renderPipeline();

        // High-Upscaled Canvas Vector Rasterizer Task Downloader
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const target = document.getElementById('mrt-signage');
            document.fonts.ready.then(() => {
                html2canvas(target, { scale: 3, logging: false, useCORS: true, backgroundColor: null }).then(canvas => {
                    const downloadLink = document.createElement('a');
                    const namingRef = currentMode === 'station' ? document.getElementById('langEn').value : 'exit_' + document.getElementById('exitSignLetter').value;
                    downloadLink.download = `${namingRef.trim().replace(/\s+/g, '_')}_signage.png`;
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.click();
                });
            });
        });
    </script>
</body>
</html>
